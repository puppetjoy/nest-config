---
description: 'Deploy an OpenVox-backed Puppet service'

parameters:
  service:
    description: 'Puppet service to deploy'
    type: String
    default: 'puppet'

  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'default'

  resources:
    description: 'Deploy resources'
    type: Boolean
    default: false

  openvox:
    description: 'Deploy OpenVox'
    type: Boolean
    default: true

  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

  render_to:
    description: 'Render the template to a file'
    type: String
    default: ''

steps:
  - description: 'Deploy resources'
    plan: nest::kubernetes::deploy
    parameters:
      namespace: $namespace
      service: "${service}-resources"
      app: 'openvox-resources'
      deploy: $deploy and $resources or $init
      wait: $render_to == ''
      render_to: $render_to

  - description: 'Deploy the instance'
    plan: nest::kubernetes::deploy
    parameters:
      namespace: $namespace
      service: $service
      app: 'openvox'
      chart: 'openvox/puppetserver'
      repo_url: 'https://openvoxproject.github.io/openvox-helm-chart'
      version: '10.1.1'
      deploy: $deploy and $openvox
      init: $init
      wait: $init
      render_to: $render_to
