---
description: 'Backup OpenVox Puppet resources'

parameters:
  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'default'

  service:
    description: 'Puppet service to backup'
    type: String
    default: 'puppet'

  service_name:
    description: 'Service name'
    type: String
    default: 'puppet'

steps:
  - description: "Backup ${service} OpenVox resources"
    plan: nest::openvox_resources::backup
    parameters:
      kubernetes_namespace: $namespace
      service: $service_name
