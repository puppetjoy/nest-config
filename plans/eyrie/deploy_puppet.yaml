---
description: 'Deploy the Puppet service'

parameters:
  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'default'

  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

  render_to:
    description: 'Render the template to a file'
    type: String
    default: ''

steps:
  - description: 'Deploy Puppet'
    plan: nest::eyrie::openvox::deploy
    parameters:
      namespace: $namespace
      service: 'puppet'
      deploy: $deploy
      init: $init
      render_to: $render_to
