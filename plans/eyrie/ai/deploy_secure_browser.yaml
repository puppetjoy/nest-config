---
description: 'Deploy shared Secure Browser'

parameters:
  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  render_to:
    description: 'Just render the template'
    type: String
    default: ''

steps:
  - description: 'Deploy shared Secure Browser'
    plan: 'nest::kubernetes::deploy'
    parameters:
      service: 'secure-browser'
      app: 'secure-browser'
      namespace: 'ai'
      init: false
      deploy: $deploy
      render_to: $render_to
