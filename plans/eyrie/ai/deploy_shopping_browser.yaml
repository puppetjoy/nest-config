---
description: 'Deploy Kasm Shopping Browser'

parameters:
  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  render_to:
    description: 'Just render the template'
    type: String
    default: ''

steps:
  - description: 'Deploy Kasm Shopping Browser'
    plan: 'nest::kubernetes::deploy'
    parameters:
      service: 'shopping'
      app: 'kasm-shopping-browser'
      namespace: 'ai'
      init: false
      deploy: $deploy
      render_to: $render_to
