---
description: 'Deploy the fast Qwen3.5 llama-server for Honcho minimal/low dialectic'

parameters:
  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'ai'

  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

  render_to:
    description: 'Just render the template'
    type: String
    default: ''

steps:
  - description: 'Deploy fast Qwen3.5 llama-server'
    plan: nest::kubernetes::deploy
    parameters:
      service: 'llama-qwen-fast'
      app: 'llama-server-fast'
      namespace: $namespace
      deploy: $deploy
      init: $init
      render_to: $render_to
