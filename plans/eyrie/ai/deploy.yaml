---
description: 'Deploy AI services'

parameters:
  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  llama:
    description: 'Deploy llama-server'
    type: Boolean
    default: true

  honcho_embeddings:
    description: 'Deploy Honcho local embedding service'
    type: Boolean
    default: true

  honcho:
    description: 'Deploy Honcho memory service'
    type: Boolean
    default: true

  talon:
    description: 'Deploy Talon dashboard edge'
    type: Boolean
    default: true

  star:
    description: 'Deploy Star dashboard edge'
    type: Boolean
    default: true

  shopping_browser:
    description: 'Deploy Kasm Shopping Browser'
    type: Boolean
    default: true

  oauth_browser:
    description: 'Deploy Kasm OAuth Browser'
    type: Boolean
    default: true

  voice_speech:
    description: 'Deploy local ROCm speech API'
    type: Boolean
    default: false

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

steps:
  - description: 'Deploy LLM servers'
    plan: nest::eyrie::ai::deploy_llama
    parameters:
      deploy: $deploy and $llama
      init: $init

  - description: 'Deploy Honcho local embedding service'
    plan: nest::eyrie::ai::deploy_honcho_embeddings
    parameters:
      deploy: $deploy and $honcho_embeddings
      init: $init

  - description: 'Deploy Honcho'
    plan: nest::eyrie::ai::deploy_honcho
    parameters:
      deploy: $deploy and $honcho
      init: $init

  - description: 'Deploy Talon dashboard edge'
    plan: nest::eyrie::ai::deploy_talon
    parameters:
      deploy: $deploy and $talon

  - description: 'Deploy Star dashboard edge'
    plan: nest::eyrie::ai::deploy_star
    parameters:
      deploy: $deploy and $star

  - description: 'Deploy Kasm Shopping Browser'
    plan: nest::eyrie::ai::deploy_shopping_browser
    parameters:
      deploy: $deploy and $shopping_browser

  - description: 'Deploy Kasm OAuth Browser'
    plan: nest::eyrie::ai::deploy_oauth_browser
    parameters:
      deploy: $deploy and $oauth_browser

  - description: 'Deploy local ROCm speech API'
    plan: nest::eyrie::ai::deploy_voice_speech
    parameters:
      deploy: $deploy and $voice_speech
      init: $init
