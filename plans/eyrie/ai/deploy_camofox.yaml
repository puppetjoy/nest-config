---
description: 'Deploy singleton Camofox REST API service'

parameters:
  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  render_to:
    description: 'Just render the template'
    type: String
    default: ''

steps:
  - description: 'Deploy singleton Camofox REST API service'
    plan: nest::kubernetes::deploy
    parameters:
      service: 'camofox'
      app: 'camofox'
      namespace: 'ai'
      init: false
      deploy: $deploy
      render_to: $render_to
