---
description: 'Deploy private Firecrawl for Hermes web research experiments'

parameters:
  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'ai'

  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

  render_to:
    description: 'Just render the template'
    type: String
    default: ''

steps:
  - description: 'Deploy Firecrawl'
    plan: nest::kubernetes::deploy
    parameters:
      namespace: $namespace
      service: 'firecrawl'
      app: 'firecrawl'
      chart: 'oci://registry-1.docker.io/winkkgmbh/firecrawl'
      version: '0.2.0'
      deploy: $deploy
      init: $init
      wait: $init
      render_to: $render_to
