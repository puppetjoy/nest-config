---
description: 'Deploy the local ROCm speech API'

parameters:
  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'ai'

  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

  render_to:
    description: 'Just render the template'
    type: String
    default: ''

steps:
  - description: 'Deploy voice-speech'
    plan: nest::kubernetes::deploy
    parameters:
      namespace: $namespace
      service: 'voice-speech'
      app: 'voice-speech'
      deploy: $deploy
      init: $init
      wait: $init
      render_to: $render_to
