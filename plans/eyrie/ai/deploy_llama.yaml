---
description: 'Deploy the canonical local Qwen3.6 llama-server'

parameters:
  deploy:
    description: 'Run or skip the deployment'
    type: Boolean
    default: true

  qwen:
    description: 'Deploy llama-qwen'
    type: Boolean
    default: true

  init:
    description: 'Deploy initial revision'
    type: Boolean
    default: false

steps:
  - description: 'Deploy canonical Qwen3.6 llama-server'
    plan: nest::eyrie::ai::deploy_llama_qwen
    parameters:
      deploy: $deploy and $qwen
      init: $init
