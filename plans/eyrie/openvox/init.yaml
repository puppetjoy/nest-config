---
description: 'Initialize OpenVox Puppet resources'

parameters:
  namespace:
    description: 'Kubernetes namespace'
    type: String
    default: 'test'

  service:
    description: 'Puppet service to initialize'
    type: String
    default: 'puppet'

  service_name:
    description: 'Kubernetes workload service name'
    type: String
    default: $service

  node_role:
    description: 'Kubernetes node role for the restore pod'
    type: String[1]
    default: 'workstation'

steps:
  - description: "Initialize ${service} OpenVox resources"
    plan: nest::eyrie::openvox::restore
    parameters:
      namespace: $namespace
      service: $service
      service_name: $service_name
      node_role: $node_role
      restore: true
