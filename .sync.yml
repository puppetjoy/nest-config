---
.gitignore:
  paths:
    - '!/bin/'
    - '/bin/*'
    - '!/bin/build'
    - '!/bin/bolt-wrapper'
    - '!/inventory.yaml'
    - '/bolt-debug.log'
    - '/build'
    - '/.modules'
    - '/.plan_cache.json'
    - '/.rerun.json'
    - '/.resource_types'
    - '/spec/fixtures/self_modules/'
    - '/.task_cache.json'

.rubocop.yml:
  default_configs:
    AllCops:
      Exclude:
        - 'lib/puppet/provider/package/cygwin.rb'

Rakefile:
  # I have my own style and that is OK
  extra_disabled_lint_checks:
    - arrow_on_right_operand_line
    - autoloader_layout
    - case_without_default
    - documentation
    - manifest_whitespace_closing_bracket_after
    - manifest_whitespace_opening_brace_before
    - manifest_whitespace_two_empty_lines
    - nested_classes_or_defines
    - parameter_documentation
    - strict_indent
    - variable_scope

spec/default_facts.yml:
  extra_facts:
    chocolateyversion: '1.2.1'
    memory:
      system:
        total_bytes: 16484859904
    mountpoints:
      /boot: {}
    networking:
      fqdn: 'test.example.com'
    path: '/usr/local/bin:/usr/bin:/bin'
    portage_cflags: '-mcpu=cortex-a72 -O2 -pipe -ggdb'
    portage_use: 'X a52 aac acl acpi activities alsa arm64 bluetooth branding bzip2 cairo cdda cdr cli crypt cups dbus declarative dri dts dvdr encode exif flac fortran gdbm gif gpm gtk gui iconv icu ipv6 jpeg kde kwallet lcms libnotify libtirpc mad mng mp3 mp4 mpeg ncurses networkmanager nls nptl ogg opengl openmp pam pango pcre pdf pipewire plasma png policykit ppds pulseaudio qml qt5 readline screencast sdl seccomp semantic-desktop sound spell ssl startup-notification svg systemd test-rust tiff truetype udev udisks unicode upower usb vorbis vulkan wayland widgets wxwidgets x264 xattr xcb xft xml xv xvid zlib zsh-completion'
    processors:
      count: 8
    rpool: 'test/crypt'

spec/spec_helper.rb:
  hiera_config_ruby: "File.expand_path(File.join(__FILE__, '../fixtures/hiera.yaml'))"
  spec_overrides:
    - |
      require 'fileutils'
      require 'json'

      def self_fixture_module_name
        JSON.parse(File.read(File.expand_path('../metadata.json', __dir__)))['name'].split('-').last
      end

      def prepare_filtered_self_fixture
        repo_root = File.expand_path('..', __dir__)
        fixtures_root = File.expand_path('fixtures', __dir__)
        filtered_modules_root = File.join(fixtures_root, 'self_modules')
        filtered_module_root = File.join(filtered_modules_root, self_fixture_module_name)

        # Puppet treats .resource_types/*.pp as manifests when the module
        # fixture is a plain symlink to the repo root. Build a minimal self
        # fixture that only exposes real module content so rspec-puppet ignores
        # generated Bolt stubs.
        module_entries = %w[
          data
          environment.conf
          files
          functions
          hiera.yaml
          lib
          manifests
          metadata.json
          plans
          site.pp
          tasks
          templates
          types
        ]

        FileUtils.rm_rf(filtered_module_root)
        FileUtils.mkdir_p(filtered_module_root)

        module_entries.each do |entry|
          source = File.join(repo_root, entry)
          target = File.join(filtered_module_root, entry)
          next unless File.exist?(source)

          FileUtils.ln_sf(source, target)
        end

        filtered_modules_root
      end

      RSpec.configure do |c|
        c.module_path = [
          prepare_filtered_self_fixture,
          File.expand_path(File.join(__dir__, 'fixtures', 'modules')),
        ].join(File::PATH_SEPARATOR)
      end
