---
config:
  podman:
    interpreters:
      rb: ['/usr/bin/ruby', '-r', 'puppet', '-e', 'Puppet[:tags] = File.open("/.apply_tags", &:gets) if File.exist? "/.apply_tags"; load ARGV.shift']
  ssh:
    interpreters:
      rb: ['/usr/bin/ruby', '-r', 'puppet']

features:
  - puppet-agent

groups:
  - name: 'puppet-server'
    config:
      ssh:
        # Legacy Puppet code deploy connects over the same worker-safe
        # unprivileged SSH transport as other Nest hosts, then uses Bolt
        # _run_as/root escalation for r10k on the target. Keep this group
        # before Gentoo because Bolt merges duplicate PuppetDB target names
        # in inventory order.
        user: 'joy'
    targets:
      - _plugin: puppetdb
        query: "resources[certname] { type = 'Class' and title = 'Nest::Service::Puppet' limit 1 }"
        target_mapping:
          name: certname
          uri: facts.fqdn

  - name: 'gentoo'
    config:
      ssh:
        # Nest hosts authenticate normal SSH transport as the unprivileged
        # nest::user account, then Bolt escalates per plan/task with _run_as.
        # Keep key selection with OpenSSH/ssh-agent/default identity handling:
        # Agent Request workers may have only the user ssh-agent socket mounted,
        # while in-cluster Bolt callers may still have /root/.ssh/id_ed25519.
        user: 'joy'
    groups:
    - name: 'servers'
      targets:
        - _plugin: puppetdb
          query: "inventory[certname] { facts.osfamily = 'Gentoo' and facts.profile.variant = 'server' and certname != 'builder' }"
          target_mapping:
            name: certname
            uri: facts.fqdn
    - name: 'workstations'
      targets:
        - _plugin: puppetdb
          query: "inventory[certname] { facts.osfamily = 'Gentoo' and facts.profile.variant = 'workstation' and certname != 'builder' }"
          target_mapping:
            name: certname
            uri: facts.fqdn

  - name: 'macs'
    targets:
      - _plugin: puppetdb
        query: "inventory[certname] { facts.osfamily = 'Darwin' }"
        target_mapping:
          name: certname
          uri: facts.fqdn

  - name: 'windows'
    targets:
      - _plugin: puppetdb
        query: "inventory[certname] { facts.osfamily = 'windows' }"
        target_mapping:
          name: certname
          uri: facts.fqdn

  - name: 'eyrie'
    groups:
      - name: 'eyrie-control-plane'
        targets:
          - _plugin: puppetdb
            query: "inventory[certname] { certname ~ '^control\\d+' }"
            target_mapping:
              name: certname
              uri: facts.fqdn
      - name: 'eyrie-workers'
        targets:
          - _plugin: puppetdb
            query: "inventory[certname] { certname ~ '^eagle(t\\d+|$)' }"
            target_mapping:
              name: certname
              uri: facts.fqdn
      - name: 'eyrie-storage'
        targets:
          - _plugin: puppetdb
            query: "inventory[certname] { certname ~ '^storage\\d+' }"
            target_mapping:
              name: certname
              uri: facts.fqdn
      - name: 'eyrie-workstations'
        targets:
          - _plugin: puppetdb
            query: "nodes { inventory { facts.profile.variant = 'workstation' } and resources { type = 'Class' and title = 'Nest::Service::Kubernetes' } }"
            target_mapping:
              name: certname
              uri: facts.fqdn
      - name: 'eyrie-compute'
        targets:
          - _plugin: puppetdb
            query: "nodes { resources { type = 'Class' and title = 'Nest::Tool::Rocm' } and resources { type = 'Class' and title = 'Nest::Service::Kubernetes' } }"
            target_mapping:
              name: certname
              uri: facts.fqdn

  - name: 'kubernetes'
    targets:
      - _plugin: task
        task: nest::get_kubernetes_services
