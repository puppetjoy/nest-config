---
default:
  interruptible: true

stages:
  - 'Test'
  - 'Build'
  - 'Deploy'

.all-branch-ci:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

'Validate':
  extends: .all-branch-ci
  image: '${CI_REGISTRY}/nest/tools/pdk'
  stage: 'Test'
  script:
    - 'pdk validate'

'Unit Test':
  extends: .all-branch-ci
  image: '${CI_REGISTRY}/nest/tools/pdk'
  stage: 'Test'
  script:
    - 'pdk test unit --parallel --verbose'

.template:
  stage: 'Build'
  script:
    - 'mkdir empty'
    - 'podman login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY" <<< $CI_REGISTRY_PASSWORD'
    - 'podman build
        --build-arg=BRANCH="$CI_COMMIT_BRANCH"
        --build-arg=REPOSITORY="$CI_REPOSITORY_URL"
        --dns=172.22.4.3
        --file=Containerfile
        --secret=id=ssh_private_key,src="$NEST_CI_PRIVATE_KEY_FILE"
        --squash
        --tag="${CI_REGISTRY_IMAGE}/${CI_COMMIT_REF_SLUG}:${CPU}"
        empty'
    - 'podman push "${CI_REGISTRY_IMAGE}/${CI_COMMIT_REF_SLUG}:${CPU}"'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $BUILD == $CPU'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $BUILD'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

'Build haswell':
  extends: .template
  tags: ['amd64']
  variables:
    CPU: 'haswell'

'Build cortex-a53':
  extends: .template
  tags: ['arm64']
  variables:
    CPU: 'cortex-a53'

'Build sifive-u74':
  extends: .template
  tags: ['riscv64']
  variables:
    CPU: 'sifive-u74'

'Build agent tool zen5':
  stage: 'Build'
  tags: ['amd64']
  variables:
    CPU: 'zen5'
  script:
    - './bin/build agent $CPU deploy=true registry=$CI_REGISTRY registry_username=$CI_REGISTRY_USER registry_password_var=CI_REGISTRY_PASSWORD'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $BUILD == "agent"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $BUILD'
      when: never

'Deploy environment':
  stage: 'Deploy'
  tags: ['r10k']
  script:
    - 'r10k deploy environment "$CI_COMMIT_BRANCH" --modules --verbose'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

'Deploy image':
  stage: 'Deploy'
  variables:
    IMAGE: "${CI_PROJECT_PATH}/${CI_COMMIT_REF_SLUG}"
  script:
    - 'podman login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY" <<< $CI_REGISTRY_PASSWORD'
    - 'podman login -u admin --password-stdin registry.eyrie <<< $EYRIE_REGISTRY_PASSWORD'
    - 'LOCAL_IMAGE="${CI_REGISTRY_IMAGE}/${CI_COMMIT_REF_SLUG}:manifest-${CI_PIPELINE_ID}"'
    - 'cleanup() { podman manifest rm "$LOCAL_IMAGE" || true; }; trap cleanup EXIT'
    - 'podman manifest exists "$LOCAL_IMAGE" && podman manifest rm "$LOCAL_IMAGE"'
    - 'podman manifest create "$LOCAL_IMAGE"'
    - 'podman manifest add "$LOCAL_IMAGE" "${CI_REGISTRY}/${IMAGE}:haswell"'
    - 'podman manifest add "$LOCAL_IMAGE" "${CI_REGISTRY}/${IMAGE}:cortex-a53"'
    - 'podman manifest add "$LOCAL_IMAGE" "${CI_REGISTRY}/${IMAGE}:sifive-u74"'
    - 'podman manifest push --all "$LOCAL_IMAGE" "${CI_REGISTRY}/${IMAGE}"'
    - 'podman manifest push --all "$LOCAL_IMAGE" "registry.eyrie/${IMAGE}"'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
