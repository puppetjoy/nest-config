---
nest::classes:
  - 'nest::tool::bolt'
  - 'nest::tool::codex'
  - 'nest::tool::minicom'
  - 'nest::tool::pdk'
  - 'nest::tool::qemu'
  - 'nest::tool::vscode'

nest::dvorak: true
nest::idle_brightness: 15
nest::subpixel_rendering: none
nest::text_scaling_factor: 2.0
nest::use: ['video_cards_nvidia']

nest::package_keywords:
  # Install latest
  app-editors/vscode: {}

  # For sleep fix in amd_pmd
  sys-kernel/linux-firmware:
    version: '~20260309'

  # Use most recent drivers that work well with GNOME 48
  x11-drivers/nvidia-drivers:
    version: '<595'

nest::package_use:
  # Deprioritize dGPU
  x11-wm/mutter:
    use: '-video_cards_nvidia'

nest::kernel_cmdline:
  - 'asus_nb_wmi.tablet_mode_sw=3' # lid-flip-rog

nest::kernel_config:
  # WiFi / Bluetooth
  CONFIG_BT_HCIBTUSB_MTK: y
  CONFIG_MT7925E: m

  # Touchpad
  CONFIG_I2C_DESIGNWARE_CORE: m
  CONFIG_I2C_DESIGNWARE_PLATFORM: m
  CONFIG_I2C_DESIGNWARE_AMDPSP: y
  CONFIG_PINCTRL: y
  CONFIG_PINCTRL_AMD: y
  CONFIG_HID_MULTITOUCH: m
  CONFIG_I2C_HID_ACPI: m
  CONFIG_COMMON_CLK: y

  # GPU switching
  CONFIG_VGA_SWITCHEROO: y

  # Speaker amp
  CONFIG_SND_HDA_SCODEC_CS35L41_I2C: m
  CONFIG_SND_SOC: m
  CONFIG_SERIAL_MULTI_INSTANTIATE: m

  # Laptop specifics
  CONFIG_HID_ASUS: m
  CONFIG_LEDS_BRIGHTNESS_HW_CHANGED: y
  CONFIG_ASUS_WMI: m
  CONFIG_ASUS_NB_WMI: m

  # Sensors
  CONFIG_HID_SENSOR_HUB: m
  CONFIG_IIO: m
  CONFIG_HID_SENSOR_ACCEL_3D: m
  CONFIG_HID_SENSOR_GYRO_3D: m

