        models:
          qwen-3.6: {}
        discover_models: true
    model_provider: 'custom:llama-qwen'
    model_name: 'qwen-3.6'
    model_base_url: 'https://llama-qwen.eyrie/v1'
    auxiliary_provider: 'custom:llama-qwen'
    auxiliary_mini_model: 'qwen-3.6'
    terminal:
      backend: 'docker'
      docker_image: 'registry.gitlab.joyfullee.me/nest/tools/agent:latest'
      docker_persist_across_processes: true
      docker_run_as_host_user: false
      container_persistent: true
      docker_volumes:
        - '/home/joy/.hermes/profiles/beryl/.ssh:/home/joy/.hermes/profiles/beryl/.ssh:ro'
        - '/home/joy/.hermes/profiles/beryl/.ssh/config:/root/.ssh/config:ro'
      docker_extra_args:
        # Host networking gives Beryl the owl/Eyrie routes needed for ssh.gitlab.eyrie.
        - '--network=host'
        # Keep owl aliases pinned to the Podman bridge gateway so Beryl's
        # dotfiles authorized_keys from="10.88.0.1" entry still permits SSH to owl.
        - '--add-host=owl:10.88.0.1'
        - '--add-host=owl.nest:10.88.0.1'
        - '--add-host=owl.nest.:10.88.0.1'
    ssh_config_content: |
      Host owl
          HostName owl.nest
          User joy
          IdentityFile /home/joy/.hermes/profiles/beryl/.ssh/id_ed25519
          IdentitiesOnly yes

      Host gitlab.joyfullee.me
          HostName ssh.gitlab.eyrie
          User git
          IdentityFile /home/joy/.hermes/profiles/beryl/.ssh/id_ed25519
          IdentitiesOnly yes

      Host ssh.gitlab.eyrie gitlab.eyrie
          User git
          IdentityFile /home/joy/.hermes/profiles/beryl/.ssh/id_ed25519
          IdentitiesOnly yes
    environment:
      HERMES_DOCKER_BINARY: '/usr/bin/podman'
