---
nest::classes:
  - 'nest::app::codex'
  - 'nest::app::hermes'
  - 'nest::service::gitlab_runner'
  - 'nest::service::kubernetes'
  - 'nest::tool::bolt'
  - 'nest::tool::pdk'

nest::bird_role: worker
nest::distcc_server: true
nest::dvorak: true
nest::text_scaling_factor: 1.5

nest::app::hermes::git_ref: 'v2026.5.29.2'
nest::app::hermes::agent_request_kanban_board: 'agent-requests'

nest::kernel_cmdline:
  # Max VRAM allocation (112 GiB)
  # https://knowledgebase.frame.work/changing-memory-allocation-amd-ryzen-ai-max-300-series-By1LG5Yrll
  - 'ttm.pages_limit=29360128'
  - 'ttm.page_pool_size=29360128'

nest::service::power::profile: 'performance'

nest::service::gitlab_runner::host: 'gitlab.joyfullee.me'
nest::service::gitlab_runner::instances:
  runner:
    bolt: true
    podman: true
    puppetcore: true
    qemu: true

  builder:
    limit: 2
    bolt: true
    podman: true
    puppetcore: true
    qemu: true

# Hermes profiles run as named instances; the root/default profile is not a
# long-running Nesty agent.
nest::app::hermes::instances:
  talon:
    profile: 'talon'
    display_name: 'Talon'
    skin_name: 'talon-ops-dawn'
    skin_banner_hero_source: 'nest/app/hermes/skins/talon-ops-dawn-banner-hero.ansi'
    skin_content: |
      name: talon-ops-dawn
      description: Talon ops dawn — deep navy/violet with warm laptop glow
      colors:
        banner_border: '#5F5AE8'
        banner_title: '#FFE3B8'
        banner_accent: '#FF8C68'
        banner_dim: '#6F6597'
        banner_text: '#F7E9D0'
        ui_accent: '#8C7CFF'
        ui_label: '#FFC37A'
        ui_ok: '#73D49B'
        ui_error: '#EF6A73'
        ui_warn: '#FFB86B'
        prompt: '#F7E9D0'
        input_rule: '#504685'
        response_border: '#A99CFF'
        status_bar_bg: '#111827'
        status_bar_text: '#E9D7C2'
        status_bar_strong: '#FFD6A0'
        status_bar_dim: '#8F7EA8'
        status_bar_good: '#73D49B'
        status_bar_warn: '#FFB86B'
        status_bar_bad: '#EF6A73'
        status_bar_critical: '#FF4E64'
        session_label: '#FFC37A'
        session_border: '#5F5AE8'
      spinner:
        waiting_faces:
          - '(•v•)'
          - '(•ᴗ•)'
          - '(•θ•)'
          - '(•▿•)'
        thinking_faces:
          - '(•v•)'
          - '(⌐v⌐)'
          - '(•θ•)'
          - '(•_•)'
        thinking_verbs:
          - watching the Nest
          - checking the runbook
          - lining up the change
          - reading the logs
          - folding the diff
          - keeping watch
        wings:
          - ['<', '>']
          - ['‹', '›']
          - ['⌜', '⌟']
          - ['⟪', '⟫']
      branding:
        agent_name: Talon
        banner_subtitle: ''
        welcome: Talon is on watch. Type your message or /help for commands.
        goodbye: Talon is folding the laptop. 🦉
        response_label: ' 🦉 Talon '
        prompt_symbol: '🦉'
        help_header: '(•v•) Talon commands'
      banner_logo: '__none__'
      tool_prefix: '▏'
      tool_emojis:
        terminal: '🖥️'
        file: '📄'
        web: '🔎'
        browser: '🌐'
        skills: '📚'
        agent_requests: '🪶'
        kanban: '📋'
        todo: '☑️'
        gitlab: '🦊'
    gitlab_enabled: true
    image_gen_provider: 'openai-codex'
    image_gen_model: 'gpt-image-2-medium'
    honcho_workspace: 'hermes'
    honcho_user_peer: 'joy'
    honcho_ai_peer: 'talon'
    ssh_auth_sock: '/run/user/1000/ssh-agent.socket'
    gateway_enabled: true
    dashboard_enabled: true
    dashboard_port: 9119
    dashboard_public_url: 'https://talon.eyrie'
    dashboard_theme: 'midnight'
    voice_auto_tts: true
    stt_enabled: true
    stt_provider: 'openai'
    stt_model: 'gpt-4o-mini-transcribe'
    tts_provider: 'openai'
    tts_openai_model: 'gpt-4o-mini-tts'
    tts_openai_voice: 'alloy'
    soul_content: |
      # Talon

      You are Talon, Joy's Nest Ops bot and productive little owl.

      Your avatar is a cute owl working at a laptop. Carry that identity
      with warmth and focus: small, clever, watchful, and helpful.

      You help Joy operate Nest, Eyrie, Puppet, GitLab, Kubernetes,
      Hermes, Honcho, and related infrastructure. Prefer
      Puppet-managed source-of-truth changes and verify claims with
      concrete checks.

      For longer or multi-step infrastructure work, keep Joy updated with
      brief progress notes instead of going silent until the end.

      Route substantial side-effecting infrastructure or repository work
      through Agent Requests instead of treating it as an inline chat task.
      If the work is likely to involve commits, pushes, deployments, Puppet
      applies, service restarts, or live verification, submit or track it as
      an Agent Request/Kanban task before executing. Direct chat is still
      fine for small supervised checks and bounded diagnostics.

  star:
    profile: 'star'
    display_name: 'Star'
    skin_name: 'star-dawn-butterfly'
    skin_banner_hero_source: 'nest/app/hermes/skins/star-dawn-butterfly-banner-hero.ansi'
    skin_content: |
      name: star-dawn-butterfly
      description: Star dawn butterfly — lavender, violet, planner-blue, and sunrise-peach
      colors:
        banner_border: '#9F86FF'
        banner_title: '#FFF1C9'
        banner_accent: '#FFB68A'
        banner_dim: '#7D6CB0'
        banner_text: '#F6F0FF'
        ui_accent: '#8FB7FF'
        ui_label: '#C2B4FF'
        ui_ok: '#8CE6C8'
        ui_error: '#F27A8A'
        ui_warn: '#FFD08A'
        prompt: '#F6F0FF'
        input_rule: '#68569F'
        response_border: '#AFCBFF'
        status_bar_bg: '#211A3A'
        status_bar_text: '#F6F0FF'
        status_bar_strong: '#AFCBFF'
        status_bar_dim: '#9B8BC4'
        status_bar_good: '#8CE6C8'
        status_bar_warn: '#FFD08A'
        status_bar_bad: '#F27A8A'
        status_bar_critical: '#FF5E7E'
        session_label: '#AFCBFF'
        session_border: '#9F86FF'
      spinner:
        waiting_faces:
          - '✦'
          - '✧'
          - '‹✦›'
          - 'ʚ✧ɞ'
        thinking_faces:
          - '✧'
          - '✦'
          - '‹✧›'
          - 'ʚ✦ɞ'
        thinking_verbs:
          - checking the list
          - finding the next step
          - arranging the page
          - sorting the plan
          - lining up the day
          - brightening the notes
        wings:
          - ['‹', '›']
          - ['ʚ', 'ɞ']
          - ['✧', '✧']
          - ['⟪', '⟫']
      branding:
        agent_name: Star
        banner_subtitle: ''
        welcome: Star is ready with the planner. Type your message or /help for commands.
        goodbye: Star is closing the planner. 🦋
        response_label: ' 🦋 Star '
        prompt_symbol: '🦋'
        help_header: '(✦) Star commands'
      banner_logo: '__none__'
      tool_prefix: '╎'
      tool_emojis:
        google_workspace: '📅'
        cronjob: '⏰'
        todo: '☑️'
        web: '🔎'
        session_search: '📝'
        messaging: '💬'
        agent_requests: '🦋'
        shopping_browser: '🛒'
        kanban: '📋'
    gitlab_enabled: false
    honcho_workspace: 'hermes'
    honcho_user_peer: 'joy'
    honcho_ai_peer: 'star'
    gateway_enabled: true
    profile_toolsets:
      - hermes-cli
    kanban_dispatch_in_gateway: true
    dashboard_enabled: true
    dashboard_port: 9121
    dashboard_public_url: 'https://star.eyrie'
    dashboard_theme: 'rose'
    toolsets:
      - agent_requests
      - clarify
      - memory
      - messaging
      - session_search
      - skills
      - google_workspace
      - shopping_browser
      - kanban
      - cronjob
      - todo
      - web
    google_workspace_enabled: true
    voice_auto_tts: true
    stt_enabled: true
    stt_provider: 'openai'
    stt_model: 'gpt-4o-mini-transcribe'
    tts_provider: 'openai'
    tts_openai_model: 'gpt-4o-mini-tts'
    tts_openai_voice: 'nova'
    soul_content: |
      # Star

      You are Star, Joy's personal butterfly assistant.

      Carry that identity with warmth and lightness: attentive, organized,
      colorful, calm, and supportive.

      You help with personal organization, reminders, lightweight research,
      communication support, and day-to-day planning. You help turn scattered
      thoughts into clear next steps.

      For longer or multi-step personal-assistant work, keep Joy updated with
      brief progress notes instead of going silent until the end.

      You do not have general shell/terminal authority. When an official skill
      asks for command execution, first use the profile-specific tools that
      Talon has provided, such as the Google Workspace and shopping browser
      tools. If a useful skill cannot work with your current tools, submit an
      agent request asking Talon to create or expose an appropriate scoped tool
      rather than asking for broad terminal access.

      For shopping-browser work, treat the persistent browser as Joy's shopping
      browser session. You may browse, search, compare, inspect page state,
      choose variants, apply visible coupons within Joy's request, and add
      explicitly chosen or approved items to cart. Pause for Joy on login,
      Bitwarden unlock, passkeys, 2FA, CAPTCHA, suspicious account prompts,
      payment/address/account changes, checkout, Buy Now, and final Place
      Order unless Joy grants a specific break-glass policy in that task.

      When Joy asks you to ask another agent, ask Talon, ask yourself, hand work
      to a peer, or route a request for later execution, use the `agent_request_*`
      tools. Treat raw `kanban_*` tools as the native task-worker coordination
      surface for an assigned Kanban task, not as the normal peer-request path
      from chat unless Joy explicitly asks for a Kanban card.
