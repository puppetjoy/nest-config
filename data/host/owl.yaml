---
nest::classes:
  - 'nest::app::codex'
  - 'nest::app::hermes'
  - 'nest::service::gitlab_runner'
  - 'nest::service::kubernetes'
  - 'nest::service::rocm'
  - 'nest::tool::bolt'
  - 'nest::tool::pdk'

nest::bird_role: worker
nest::distcc_server: true
nest::dvorak: true
nest::text_scaling_factor: 1.5

nest::app::hermes::git_ref: 'hermes/0.16.0-nest'
nest::app::hermes::git_commit: '2abd9cc31f9021ed3230eeaf8cf77a10082955e6'
nest::app::hermes::agent_request_kanban_board: 'agent-requests'

nest::kernel_cmdline:
  # Max VRAM allocation (112 GiB)
  # https://knowledgebase.frame.work/changing-memory-allocation-amd-ryzen-ai-max-300-series-By1LG5Yrll
  - 'ttm.pages_limit=29360128'
  - 'ttm.page_pool_size=29360128'

nest::service::power::profile: 'performance'

nest::package_keywords:
  # ROCm/HIP 7.2 stack for owl Strix Halo compute.
  dev-build/rocm-cmake: {}
  dev-libs/rocm-comgr: {}
  dev-libs/rocm-core: {}
  dev-libs/rocm-device-libs: {}
  dev-libs/rocr-runtime: {}
  dev-libs/roct-thunk-interface: {}
  dev-util/hip: {}
  dev-util/hipcc: {}
  dev-util/rocminfo: {}
  llvm-core/clang: {}
  llvm-core/clang-common: {}
  llvm-core/clang-linker-config: {}
  llvm-core/clang-toolchain-symlinks: {}
  llvm-core/lld: {}
  llvm-core/lld-toolchain-symlinks: {}
  llvm-core/llvm: {}
  llvm-core/llvm-toolchain-symlinks: {}
  llvm-core/llvmgold: {}
  llvm-runtimes/clang-rtlib-config: {}
  llvm-runtimes/clang-runtime: {}
  llvm-runtimes/clang-stdlib-config: {}
  llvm-runtimes/clang-unwindlib-config: {}
  llvm-runtimes/compiler-rt: {}
  llvm-runtimes/compiler-rt-sanitizers: {}
  llvm-runtimes/openmp: {}

nest::service::gitlab_runner::host: 'gitlab.joyfullee.me'
nest::service::gitlab_runner::instances:
  runner:
    bolt: true
    podman: true
    puppetcore: true
    qemu: true

  builder:
    limit: 2
    bolt: true
    podman: true
    puppetcore: true
    qemu: true

# Hermes profiles run as named instances; the root/default profile is not a
# long-running Nesty agent.
# Profile SOUL.md text is supplied by private Hiera so identity/personality
# stays in nest/private rather than public host data.
