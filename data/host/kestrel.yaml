---
nest::classes:
  - 'nest::host::kestrel'
  - 'nest::service::gitlab_runner'
  - 'nest::service::llama_server'
  - 'nest::service::usb_resetter'
  - 'nest::tool::bolt'

nest::autologin: sway
nest::bird_role: server
nest::dvorak: true
nest::external_interfaces: ['br0', 'tun0'] # for dnsmasq
nest::monitor_layout: ['DP-3@0', 'HDMI-A-1@2560']
nest::primary_monitor: 'HDMI-A-1'
nest::public_ssh: true
nest::router: true
nest::swap_alt_win: true
nest::text_scaling_factor: 1.1

nest::dtb_overlay: |
  / {
      fragment@0 {
          target-path = "/pwm-fan";
          __overlay__ {
              cooling-levels = <64 112 160 208 255>;
          };
      };
  };

# Apache pulled in by host manifest
nest::service::apache::manage_firewall: true

nest::service::gitlab_runner::host: 'gitlab.joyfullee.me'
nest::service::gitlab_runner::instances:
  builder:
    access_level: 'not_protected'
    registration_token_key: 'nest::private::gitlab_runner::kestrel_builder_registration_token'
    limit: 4
    bolt: true
    podman: true
    puppetcore: true
    qemu: true

nest::service::llama_server::instances:
  qwen35:
    # Best-fit Qwen3.5 dense Q8 target for Kestrel's RX 7600-class 8 GiB GPU.
    # `--ctx-size` is a total server budget split across `--parallel` slots in
    # current llama.cpp; 131072 therefore gives two 65536-token slots.
    # The MTP GGUF is not selected because Unsloth/HF currently document that
    # Qwen3.5 MTP is incompatible with `-np > 1`, and Joy explicitly asked for
    # two max-context slots.
    repo: unsloth/Qwen3.5-4B-GGUF:Q8_0
    kv_size: 131072
    parallel: 2
    gpu_layers: 999
    flash_attention: true

# Workaround usbnet hang at boot
# See: https://gitlab.joyfullee.me/nest/config/-/issues/64
nest::service::usb_resetter::device_ids:
  - '0525:a4a2' # Linux-USB Ethernet/RNDIS Gadget
