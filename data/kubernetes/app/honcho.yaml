---
include:
  - 'nest::service::honcho'

plan_base: 'nest::eyrie::ai::honcho'
service_name: "%{nest::kubernetes::service}"

cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
honcho_image: ghcr.io/plastic-labs/honcho:v3.0.8
honcho_database: honcho
honcho_user: honcho
ingress_class: contour-compute
node_role: compute
postgres_image: ghcr.io/cloudnative-pg/postgresql:17.6
postgres_storage_class: owl-crypt
postgres_storage_size: 16Gi
redis_storage_class: owl-crypt
redis_storage_size: 1Gi

.affinity: &affinity
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists

.tolerations: &tolerations
  - key: "node-role.kubernetes.io/%{lookup('node_role')}"
    operator: Exists
    effect: NoSchedule

.honcho_env: &honcho_env
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: "%{nest::kubernetes::service}-cnpg-app"
        key: password
  - name: DB_CONNECTION_URI
    value: "postgresql+psycopg://%{lookup('honcho_user')}:$(POSTGRES_PASSWORD)@%{nest::kubernetes::service}-cnpg-rw:5432/%{lookup('honcho_database')}"
  - name: CACHE_URL
    value: "redis://%{nest::kubernetes::service}-redis:6379/0?suppress=true"
  - name: CACHE_ENABLED
    value: 'true'
  - name: AUTH_USE_AUTH
    value: 'false'
  - name: LLM_OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: "%{nest::kubernetes::service}-secrets"
        key: LLM_OPENAI_API_KEY

resources:
  registry_auths: {}

  # Direct standalone init Job.  Honcho is a Nest-owned chartless app, so the
  # destructive restore command stays visible here instead of being injected
  # indirectly through the shared james.tl/nest/20-nest-init patch path.
  init:
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: "%{nest::kubernetes::service}-init"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 21600
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: "%{nest::kubernetes::service}-registry-auths"
          containers:
            - name: nest
              image: "%{lookup('config_registry')}/nest/config/main"
              imagePullPolicy: Always
              command:
                - bolt
                - plan
                - run
                - "%{lookup('plan_base')}::init"
                - "namespace=%{nest::kubernetes::namespace}"
                - "service=%{nest::kubernetes::service}"
                - "service_name=%{lookup('service_name')}"
              env:
                - name: KUBECONFIG
                  value: '/nest/home/kubeconfigs/eyrie.conf'
              securityContext:
                runAsUser: 0
                runAsGroup: 0
              volumeMounts:
                - name: nest
                  mountPath: '/nest'
                - name: bolt-config
                  mountPath: '/etc/puppetlabs/bolt'
                  readOnly: true
                - name: eyaml-config
                  mountPath: '/etc/eyaml'
                  readOnly: true
                - name: eyrie-ssh-key
                  mountPath: '/root/.ssh/id_ed25519'
                  readOnly: true
          volumes:
            - name: nest
              hostPath:
                path: '/nest'
                type: Directory
            - name: bolt-config
              hostPath:
                path: '/etc/puppetlabs/bolt'
                type: Directory
            - name: eyaml-config
              hostPath:
                path: '/etc/eyaml'
                type: Directory
            - name: eyrie-ssh-key
              hostPath:
                path: '/root/.ssh/id_ed25519_eyrie'
                type: File

  certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{nest::kubernetes::fqdn}"

  secrets:
    apiVersion: v1
    kind: Secret
    metadata:
      name: "%{nest::kubernetes::service}-secrets"
      namespace: "%{nest::kubernetes::namespace}"
    type: Opaque
    data:
      LLM_OPENAI_API_KEY: "%{nest::service::honcho::openai_api_key_base64}"

  postgres-cluster:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: "%{nest::kubernetes::service}-cnpg"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      instances: 1
      imageName: "%{lookup('postgres_image')}"
      bootstrap:
        initdb:
          database: "%{lookup('honcho_database')}"
          owner: "%{lookup('honcho_user')}"
          postInitApplicationSQL:
            - CREATE EXTENSION IF NOT EXISTS vector;
      storage:
        storageClass: "%{lookup('postgres_storage_class')}"
        size: "%{lookup('postgres_storage_size')}"
      affinity:
        nodeSelector:
          "node-role.kubernetes.io/%{lookup('node_role')}": ''
        tolerations: *tolerations

  redis-storage:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('redis_storage_size')}"
      storageClassName: "%{lookup('redis_storage_class')}"

  redis-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}-redis"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}-redis"
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: redis
              image: docker.io/library/redis:8.2
              ports:
                - name: redis
                  containerPort: 6379
              volumeMounts:
                - name: data
                  mountPath: /data
              readinessProbe:
                exec:
                  command: ['redis-cli', 'ping']
                periodSeconds: 5
                timeoutSeconds: 2
              livenessProbe:
                exec:
                  command: ['redis-cli', 'ping']
                periodSeconds: 10
                timeoutSeconds: 2
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-redis"

  redis-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}-redis"
      ports:
        - name: redis
          port: 6379
          targetPort: 6379

  api-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-api"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
          component: api
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            component: api
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: api
              image: "%{lookup('honcho_image')}"
              command: ['sh', 'docker/entrypoint.sh']
              env: *honcho_env
              ports:
                - name: http
                  containerPort: 8000
              startupProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                failureThreshold: 30
                timeoutSeconds: 2
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 5
                failureThreshold: 3
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                failureThreshold: 6
                timeoutSeconds: 2

  deriver-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-deriver"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
          component: deriver
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            component: deriver
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: deriver
              image: "%{lookup('honcho_image')}"
              command: ['/app/.venv/bin/python', '-m', 'src.deriver']
              env: *honcho_env

  api-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        james.tl/fqdn: "%{nest::kubernetes::fqdn}"
        james.tl/service_name: "%{nest::kubernetes::service_name}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
        component: api
      ports:
        - name: http
          port: 80
          targetPort: 8000

  ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      annotations:
        projectcontour.io/response-timeout: infinity
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      tls:
        - secretName: "%{nest::kubernetes::service}-certs"
          hosts:
            - "%{nest::kubernetes::fqdn}"
      rules:
        - host: "%{nest::kubernetes::fqdn}"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: "%{nest::kubernetes::service}"
                    port:
                      name: http
