resources:
  registry_auths: {}

  # Direct standalone init Job.  Honcho is a Nest-owned chartless app, so the
  # destructive restore command stays visible here instead of being injected
  # indirectly through the shared joyfullee.me/nest/20-nest-init patch path.
  init:
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: "%{nest::kubernetes::service}-init"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 21600
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: "%{nest::kubernetes::service}-registry-auths"
          containers:
            - name: nest
              image: "%{lookup('config_registry')}/nest/config/main"
              imagePullPolicy: Always
              command:
                - bolt
                - plan
                - run
                - "%{lookup('plan_base')}::init"
                - "namespace=%{nest::kubernetes::namespace}"
                - "service=%{nest::kubernetes::service}"
                - "service_name=%{lookup('service_name')}"
              env:
                - name: KUBECONFIG
                  value: '/nest/home/kubeconfigs/eyrie.conf'
              securityContext:
                runAsUser: 0
                runAsGroup: 0
              volumeMounts:
                - name: nest
                  mountPath: '/nest'
                - name: bolt-config
                  mountPath: '/etc/puppetlabs/bolt'
                  readOnly: true
                - name: eyaml-config
                  mountPath: '/etc/eyaml'
                  readOnly: true
                - name: eyrie-ssh-key
                  mountPath: '/root/.ssh/id_ed25519'
                  readOnly: true
          volumes:
            - name: nest
              hostPath:
                path: '/nest'
                type: Directory
            - name: bolt-config
              hostPath:
                path: '/etc/puppetlabs/bolt'
                type: Directory
            - name: eyaml-config
              hostPath:
                path: '/etc/eyaml'
                type: Directory
            - name: eyrie-ssh-key
              hostPath:
                path: '/root/.ssh/id_ed25519_eyrie'
                type: File

  representation-subthreshold-expiry-dry-run:
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: "%{nest::kubernetes::service}-representation-subthreshold-expiry-dry-run"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{nest::kubernetes::service}"
        component: representation-subthreshold-expiry
    spec:
      concurrencyPolicy: Forbid
      schedule: "%{lookup('representation_subthreshold_expiry_schedule')}"
      timeZone: 'America/New_York'
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          ttlSecondsAfterFinished: "%{alias('representation_subthreshold_expiry_job_ttl')}"
          template:
            metadata:
              labels:
                app: "%{nest::kubernetes::service}"
                component: representation-subthreshold-expiry
            spec:
              restartPolicy: Never
              affinity: *affinity
              tolerations: *tolerations
              containers:
                - name: dry-run
                  image: "%{lookup('postgres_image')}"
                  imagePullPolicy: IfNotPresent
                  command:
                    - /bin/sh
                    - -ceu
                    - |-
                      echo "honcho representation subthreshold expiry dry-run"
                      echo "threshold=${REPRESENTATION_BATCH_MAX_TOKENS} ttl=${SUBTHRESHOLD_REPRESENTATION_TTL} mode=dry-run"
                      psql --no-psqlrc --set=ON_ERROR_STOP=1 \
                        --set=threshold="${REPRESENTATION_BATCH_MAX_TOKENS}" \
                        --set=ttl="${SUBTHRESHOLD_REPRESENTATION_TTL}" <<'SQL'
                      \pset pager off
                      \pset border 2
                      \echo candidate summary
                      WITH grouped AS (
                        SELECT
                          q.work_unit_key,
                          count(*) AS row_count,
                          coalesce(sum(m.token_count), 0) AS total_tokens,
                          min(q.created_at) AS oldest_pending_at,
                          max(q.created_at) AS newest_pending_at
                        FROM queue q
                        LEFT JOIN messages m ON m.id = q.message_id
                        WHERE q.processed = false
                          AND q.task_type = 'representation'
                          AND q.work_unit_key IS NOT NULL
                          AND NOT EXISTS (
                            SELECT 1
                            FROM active_queue_sessions a
                            WHERE a.work_unit_key = q.work_unit_key
                          )
                        GROUP BY q.work_unit_key
                      ), candidates AS (
                        SELECT *
                        FROM grouped
                        WHERE total_tokens < :threshold
                          AND oldest_pending_at < now() - (:'ttl')::interval
                      )
                      SELECT
                        count(*) AS candidate_work_units,
                        coalesce(sum(row_count), 0) AS candidate_queue_rows,
                        coalesce(min(oldest_pending_at), now()) AS oldest_candidate_at,
                        coalesce(max(newest_pending_at), now()) AS newest_candidate_at,
                        coalesce(max(now() - oldest_pending_at), interval '0 seconds') AS oldest_candidate_age,
                        coalesce(round(avg(total_tokens)::numeric, 1), 0) AS avg_tokens
                      FROM candidates;
                      \echo oldest candidate samples: work_unit_key is md5-hashed; no message content is selected
                      WITH grouped AS (
                        SELECT
                          q.work_unit_key,
                          count(*) AS row_count,
                          coalesce(sum(m.token_count), 0) AS total_tokens,
                          min(q.created_at) AS oldest_pending_at,
                          max(q.created_at) AS newest_pending_at
                        FROM queue q
                        LEFT JOIN messages m ON m.id = q.message_id
                        WHERE q.processed = false
                          AND q.task_type = 'representation'
                          AND q.work_unit_key IS NOT NULL
                          AND NOT EXISTS (
                            SELECT 1
                            FROM active_queue_sessions a
                            WHERE a.work_unit_key = q.work_unit_key
                          )
                        GROUP BY q.work_unit_key
                      ), candidates AS (
                        SELECT *
                        FROM grouped
                        WHERE total_tokens < :threshold
                          AND oldest_pending_at < now() - (:'ttl')::interval
                      )
                      SELECT
                        md5(work_unit_key) AS work_unit_hash,
                        row_count,
                        total_tokens,
                        oldest_pending_at,
                        newest_pending_at,
                        now() - oldest_pending_at AS oldest_age
                      FROM candidates
                      ORDER BY oldest_pending_at ASC
                      LIMIT 20;
                      SQL
                  env:
                    - name: PGHOST
                      value: "%{nest::kubernetes::service}-cnpg-rw"
                    - name: PGPORT
                      value: '5432'
                    - name: PGDATABASE
                      value: "%{lookup('honcho_database')}"
                    - name: PGUSER
                      value: "%{lookup('honcho_user')}"
                    - name: PGPASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: "%{nest::kubernetes::service}-cnpg-app"
                          key: password
                    - name: REPRESENTATION_BATCH_MAX_TOKENS
                      value: "%{alias('representation_batch_max_tokens')}"
                    - name: SUBTHRESHOLD_REPRESENTATION_TTL
                      value: "%{lookup('representation_subthreshold_ttl')}"

  qwen-limiter-script:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{lookup('honcho_llama_qwen_limiter_service')}-script"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{lookup('honcho_llama_qwen_limiter_service')}"
        component: qwen-limiter
    data:
      limiter.py: |-
        import http.client
        import json
        import os
        import sys
        import threading
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

        MAX_CONCURRENT = int(os.environ.get('MAX_CONCURRENT', '2'))
        QUEUE_TIMEOUT_SECONDS = float(os.environ.get('QUEUE_TIMEOUT_SECONDS', '30'))
        UPSTREAM_HOST = os.environ.get('UPSTREAM_HOST', 'llama-qwen')
        UPSTREAM_PORT = int(os.environ.get('UPSTREAM_PORT', '80'))
        UPSTREAM_TIMEOUT_SECONDS = float(os.environ.get('UPSTREAM_TIMEOUT_SECONDS', '600'))

        semaphore = threading.BoundedSemaphore(MAX_CONCURRENT)
        active_lock = threading.Lock()
        active_upstream = 0

        HOP_BY_HOP_HEADERS = {
            'connection',
            'keep-alive',
            'proxy-authenticate',
            'proxy-authorization',
            'te',
            'trailer',
            'transfer-encoding',
            'upgrade',
        }

        def log(message):
            print(message, file=sys.stderr, flush=True)

        def summarize_chat_request(request_body):
            if not request_body:
                return 'request_json=empty'
            try:
                payload = json.loads(request_body.decode('utf-8'))
            except Exception:
                return 'request_json=unparsed'
            if not isinstance(payload, dict):
                return 'request_json=non_object'
            messages = payload.get('messages')
            tools = payload.get('tools')
            if isinstance(messages, list):
                message_count = len(messages)
                message_chars = sum(
                    len(str(message.get('content') or ''))
                    for message in messages
                    if isinstance(message, dict)
                )
            else:
                message_count = 'n/a'
                message_chars = 'n/a'
            tool_count = len(tools) if isinstance(tools, list) else 0
            max_tokens = payload.get('max_tokens') or payload.get('max_completion_tokens')
            reasoning = payload.get('reasoning') if isinstance(payload, dict) else None
            reasoning_max = reasoning.get('max_tokens') if isinstance(reasoning, dict) else None
            return (
                f'max_tokens={max_tokens!r} stream={payload.get("stream", False)!r} '
                f'messages={message_count} message_chars={message_chars} '
                f'tools={tool_count} tool_choice={payload.get("tool_choice")!r} '
                f'reasoning_max_tokens={reasoning_max!r}'
            )

        def summarize_chat_response(response_body):
            if not response_body:
                return 'response_json=empty'
            try:
                payload = json.loads(response_body.decode('utf-8'))
            except Exception:
                return 'response_json=unparsed'
            if not isinstance(payload, dict):
                return 'response_json=non_object'
            choices = payload.get('choices')
            first_choice = choices[0] if isinstance(choices, list) and choices else {}
            usage = payload.get('usage') if isinstance(payload.get('usage'), dict) else {}
            message = first_choice.get('message') if isinstance(first_choice, dict) else {}
            content = message.get('content') if isinstance(message, dict) else None
            tool_calls = message.get('tool_calls') if isinstance(message, dict) else None
            return (
                f'finish_reason={first_choice.get("finish_reason")!r} '
                f'prompt_tokens={usage.get("prompt_tokens")!r} '
                f'completion_tokens={usage.get("completion_tokens")!r} '
                f'total_tokens={usage.get("total_tokens")!r} '
                f'content_chars={len(content) if isinstance(content, str) else 0} '
                f'tool_calls={len(tool_calls) if isinstance(tool_calls, list) else 0}'
            )

        class LimiterHandler(BaseHTTPRequestHandler):
            protocol_version = 'HTTP/1.1'

            def do_GET(self):
                if self.path == '/limiter/status':
                    self.send_json(200, {
                        'status': 'ok',
                        'max_concurrent': MAX_CONCURRENT,
                        'active_upstream': active_upstream,
                        'queue_timeout_seconds': QUEUE_TIMEOUT_SECONDS,
                        'upstream': f'http://{UPSTREAM_HOST}:{UPSTREAM_PORT}',
                    })
                    return
                self.proxy()

            def do_HEAD(self):
                self.proxy()

            def do_POST(self):
                self.proxy()

            def do_PUT(self):
                self.proxy()

            def do_PATCH(self):
                self.proxy()

            def do_DELETE(self):
                self.proxy()

            def request_content_length(self):
                value = self.headers.get('Content-Length')
                if value is None or value == '':
                    return 0
                try:
                    length = int(value)
                except ValueError:
                    return None
                if length < 0:
                    return None
                return length

            def send_json(self, status, payload, close=False, extra_headers=None):
                data = json.dumps(payload, sort_keys=True).encode('utf-8')
                if close:
                    self.close_connection = True
                self.send_response(status)
                self.send_header('Content-Type', 'application/json')
                self.send_header('Content-Length', str(len(data)))
                if close:
                    self.send_header('Connection', 'close')
                for key, value in (extra_headers or {}).items():
                    self.send_header(key, value)
                self.end_headers()
                if self.command != 'HEAD':
                    self.wfile.write(data)

            def read_request_body(self, content_length):
                if not content_length:
                    return None
                return self.rfile.read(content_length)

            def proxy(self):
                global active_upstream

                if self.headers.get('Transfer-Encoding'):
                    log(f'bad_request method={self.command} path={self.path} unsupported_transfer_encoding={self.headers.get("Transfer-Encoding")!r}')
                    self.send_json(400, {'error': 'Transfer-Encoding is not supported by this limiter'}, close=True)
                    return

                content_length = self.request_content_length()
                if content_length is None:
                    log(f'bad_request method={self.command} path={self.path} invalid_content_length={self.headers.get("Content-Length")!r}')
                    self.send_json(400, {'error': 'invalid Content-Length'}, close=True)
                    return

                acquired = semaphore.acquire(timeout=QUEUE_TIMEOUT_SECONDS)
                if not acquired:
                    log(f'reject method={self.command} path={self.path} content_length={content_length} active={active_upstream}/{MAX_CONCURRENT}')
                    self.send_json(503, {
                        'error': 'honcho llama-qwen concurrency limit reached',
                        'max_concurrent': MAX_CONCURRENT,
                    }, close=True, extra_headers={
                        'Retry-After': str(int(QUEUE_TIMEOUT_SECONDS)),
                    })
                    return

                with active_lock:
                    active_upstream += 1
                    current_active = active_upstream
                log(f'start method={self.command} path={self.path} content_length={content_length} active={current_active}/{MAX_CONCURRENT}')

                sent_response = False
                conn = None
                try:
                    try:
                        request_body = self.read_request_body(content_length)
                    except Exception as exc:
                        log(f'bad_request method={self.command} path={self.path} read_error={exc!r}')
                        self.send_json(400, {'error': 'failed to read request body'}, close=True)
                        return
                    if content_length and len(request_body or b'') != content_length:
                        log(f'bad_request method={self.command} path={self.path} incomplete_body={len(request_body or b"")}/{content_length}')
                        self.send_json(400, {'error': 'incomplete request body'}, close=True)
                        return
                    if self.command == 'POST' and self.path.startswith('/v1/chat/completions'):
                        log(f'request_summary path={self.path} {summarize_chat_request(request_body)}')

                    headers = {
                        key: value
                        for key, value in self.headers.items()
                        if key.lower() not in HOP_BY_HOP_HEADERS and key.lower() != 'host'
                    }
                    headers['Host'] = UPSTREAM_HOST

                    conn = http.client.HTTPConnection(UPSTREAM_HOST, UPSTREAM_PORT, timeout=UPSTREAM_TIMEOUT_SECONDS)
                    conn.request(self.command, self.path, body=request_body, headers=headers)
                    response = conn.getresponse()
                    response_body = response.read()
                    if self.command == 'POST' and self.path.startswith('/v1/chat/completions'):
                        log(f'response_summary path={self.path} status={response.status} {summarize_chat_response(response_body)}')

                    self.send_response(response.status, response.reason)
                    sent_response = True
                    for key, value in response.getheaders():
                        lower_key = key.lower()
                        if lower_key in HOP_BY_HOP_HEADERS or lower_key == 'content-length':
                            continue
                        self.send_header(key, value)
                    self.send_header('Content-Length', str(len(response_body)))
                    self.send_header('X-Honcho-Qwen-Limiter-Max-Concurrent', str(MAX_CONCURRENT))
                    self.end_headers()
                    if self.command != 'HEAD' and response_body:
                        self.wfile.write(response_body)
                except Exception as exc:
                    log(f'upstream_error method={self.command} path={self.path} error={exc!r}')
                    if not sent_response:
                        self.send_json(502, {'error': 'honcho llama-qwen limiter upstream error'}, close=True)
                finally:
                    if conn is not None:
                        conn.close()
                    with active_lock:
                        active_upstream -= 1
                        current_active = active_upstream
                    semaphore.release()
                    log(f'finish method={self.command} path={self.path} active={current_active}/{MAX_CONCURRENT}')

            def log_message(self, fmt, *args):
                log('%s - - [%s] %s' % (self.client_address[0], self.log_date_time_string(), fmt % args))

        if __name__ == '__main__':
            bind = ('0.0.0.0', int(os.environ.get('PORT', '8000')))
            server = ThreadingHTTPServer(bind, LimiterHandler)
            log(f'honcho llama-qwen limiter listening on {bind[0]}:{bind[1]} max_concurrent={MAX_CONCURRENT}')
            server.serve_forever()

  qwen-limiter-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{lookup('honcho_llama_qwen_limiter_service')}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: "%{lookup('honcho_llama_qwen_limiter_service')}"
          component: qwen-limiter
      template:
        metadata:
          labels:
            app: "%{lookup('honcho_llama_qwen_limiter_service')}"
            component: qwen-limiter
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: limiter
              image: "%{lookup('honcho_image')}"
              command:
                - /app/.venv/bin/python
                - /opt/honcho-qwen-limiter/limiter.py
              env:
                - name: MAX_CONCURRENT
                  value: "%{alias('honcho_llama_qwen_max_concurrent')}"
                - name: QUEUE_TIMEOUT_SECONDS
                  value: "%{alias('honcho_llama_qwen_queue_timeout_seconds')}"
                - name: UPSTREAM_HOST
                  value: "%{lookup('honcho_llama_qwen_upstream')}"
                - name: UPSTREAM_PORT
                  value: '80'
              ports:
                - name: http
                  containerPort: 8000
              readinessProbe:
                httpGet:
                  path: /limiter/status
                  port: 8000
                periodSeconds: 5
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /limiter/status
                  port: 8000
                periodSeconds: 10
                timeoutSeconds: 2
              volumeMounts:
                - name: limiter-script
                  mountPath: /opt/honcho-qwen-limiter
                  readOnly: true
          volumes:
            - name: limiter-script
              configMap:
                name: "%{lookup('honcho_llama_qwen_limiter_service')}-script"

  qwen-limiter-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{lookup('honcho_llama_qwen_limiter_service')}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{lookup('honcho_llama_qwen_limiter_service')}"
        component: qwen-limiter
    spec:
      type: ClusterIP
      selector:
        app: "%{lookup('honcho_llama_qwen_limiter_service')}"
        component: qwen-limiter
      ports:
        - name: http
          port: 80
          targetPort: 8000

  certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{nest::kubernetes::fqdn}"

  postgres-cluster:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: "%{nest::kubernetes::service}-cnpg"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      instances: 1
      imageName: "%{lookup('postgres_image')}"
      bootstrap:
        initdb:
          database: "%{lookup('honcho_database')}"
          owner: "%{lookup('honcho_user')}"
          postInitApplicationSQL:
            - CREATE EXTENSION IF NOT EXISTS vector;
      storage:
        storageClass: "%{lookup('postgres_storage_class')}"
        size: "%{lookup('postgres_storage_size')}"
      affinity:
        nodeSelector:
          "node-role.kubernetes.io/%{lookup('node_role')}": ''
        tolerations: *tolerations

  redis-storage:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('redis_storage_size')}"
      storageClassName: "%{lookup('redis_storage_class')}"

  redis-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}-redis"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}-redis"
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: redis
              image: docker.io/library/redis:8.2
              ports:
                - name: redis
                  containerPort: 6379
              volumeMounts:
                - name: data
                  mountPath: /data
              readinessProbe:
                exec:
                  command: ['redis-cli', 'ping']
                periodSeconds: 5
                timeoutSeconds: 2
              livenessProbe:
                exec:
                  command: ['redis-cli', 'ping']
                periodSeconds: 10
                timeoutSeconds: 2
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-redis"

  redis-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}-redis"
      ports:
        - name: redis
          port: 6379
          targetPort: 6379

  api-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-api"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
          component: api
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            component: api
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: api
              image: "%{lookup('honcho_image')}"
              command: ['sh', 'docker/entrypoint.sh']
              env: *honcho_env
              ports:
                - name: http
                  containerPort: 8000
              startupProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                failureThreshold: 30
                timeoutSeconds: 2
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 5
                failureThreshold: 3
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                failureThreshold: 6
                timeoutSeconds: 2

  deriver-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-deriver"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
          component: deriver
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            component: deriver
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: deriver
              image: "%{lookup('honcho_image')}"
              command: ['/app/.venv/bin/python', '-m', 'src.deriver']
              env: *honcho_env

  api-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        joyfullee.me/fqdn: "%{nest::kubernetes::fqdn}"
        joyfullee.me/service_name: "%{nest::kubernetes::service_name}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
        component: api
      ports:
        - name: http
          port: 80
          targetPort: 8000

  ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      annotations:
        projectcontour.io/response-timeout: infinity
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      tls:
        - secretName: "%{nest::kubernetes::service}-certs"
          hosts:
            - "%{nest::kubernetes::fqdn}"
      rules:
        - host: "%{nest::kubernetes::fqdn}"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: "%{nest::kubernetes::service}"
                    port:
                      name: http
