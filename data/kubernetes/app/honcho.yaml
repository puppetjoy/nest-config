---
plan_base: 'nest::eyrie::ai::honcho'
service_name: "%{nest::kubernetes::service}"

cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
honcho_image: ghcr.io/plastic-labs/honcho:v3.0.8
honcho_database: honcho
honcho_user: honcho
ingress_class: contour-compute
node_role: compute
postgres_image: ghcr.io/cloudnative-pg/postgresql:17.6
postgres_storage_class: owl-crypt
postgres_storage_size: 16Gi
redis_storage_class: owl-crypt
redis_storage_size: 1Gi
honcho_llama_qwen_limiter_service: llama-qwen-honcho
honcho_llama_qwen_base_url: "http://%{lookup('honcho_llama_qwen_limiter_service')}/v1"
honcho_llama_qwen_upstream: llama-qwen
honcho_llama_qwen_max_concurrent: '2'
honcho_llama_qwen_queue_timeout_seconds: '30'
representation_batch_max_tokens: '1024'
representation_subthreshold_ttl: '7 days'
representation_subthreshold_expiry_schedule: '17 */6 * * *'
representation_subthreshold_expiry_job_ttl: 21600

.affinity: &affinity
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists

.tolerations: &tolerations
  - key: "node-role.kubernetes.io/%{lookup('node_role')}"
    operator: Exists
    effect: NoSchedule

.honcho_env: &honcho_env
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: "%{nest::kubernetes::service}-cnpg-app"
        key: password
  - name: DB_CONNECTION_URI
    value: "postgresql+psycopg://%{lookup('honcho_user')}:$(POSTGRES_PASSWORD)@%{nest::kubernetes::service}-cnpg-rw:5432/%{lookup('honcho_database')}"
  - name: CACHE_URL
    value: "redis://%{nest::kubernetes::service}-redis:6379/0?suppress=true"
  - name: CACHE_ENABLED
    value: 'true'
  - name: AUTH_USE_AUTH
    value: 'false'

  # Local OpenAI-compatible embedding endpoint.  BGE-M3 emits 1024-dimensional
  # vectors, so this config must be deployed together with the reviewed
  # pgvector schema/re-embedding migration; deploying it against the existing
  # 1536-dimensional OpenAI embeddings will fail Honcho's startup validator.
  - name: EMBEDDING_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: EMBEDDING_MODEL_CONFIG__MODEL
    value: 'bge-m3'
  - name: EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: 'http://honcho-embeddings/v1'
  - name: EMBEDDING_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: EMBEDDING_MODEL_CONFIG__DIMENSIONS_MODE
    value: 'never'
  - name: EMBEDDING_VECTOR_DIMENSIONS
    value: '1024'
  - name: EMBEDDING_MAX_INPUT_TOKENS
    value: '8192'
  - name: EMBEDDING_MAX_TOKENS_PER_REQUEST
    value: '8192'

  # Honcho's OpenAI transport requires an API key value even for local
  # OpenAI-compatible services; llama.cpp ignores the placeholder.
  - name: HONCHO_LOCAL_OPENAI_API_KEY
    value: 'not-a-real-key'
  - name: DERIVER_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DERIVER_MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DERIVER_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: SUMMARY_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: SUMMARY_MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: SUMMARY_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DREAM_DEDUCTION_MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DREAM_INDUCTION_MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'

resources:
  registry_auths: {}

  # Direct standalone init Job.  Honcho is a Nest-owned chartless app, so the
  # destructive restore command stays visible here instead of being injected
  # indirectly through the shared joyfullee.me/nest/20-nest-init patch path.
  init:
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: "%{nest::kubernetes::service}-init"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 21600
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: "%{nest::kubernetes::service}-registry-auths"
          containers:
            - name: nest
              image: "%{lookup('config_registry')}/nest/config/main"
              imagePullPolicy: Always
              command:
                - bolt
                - plan
                - run
                - "%{lookup('plan_base')}::init"
                - "namespace=%{nest::kubernetes::namespace}"
                - "service=%{nest::kubernetes::service}"
                - "service_name=%{lookup('service_name')}"
              env:
                - name: KUBECONFIG
                  value: '/nest/home/kubeconfigs/eyrie.conf'
              securityContext:
                runAsUser: 0
                runAsGroup: 0
              volumeMounts:
                - name: nest
                  mountPath: '/nest'
                - name: bolt-config
                  mountPath: '/etc/puppetlabs/bolt'
                  readOnly: true
                - name: eyaml-config
                  mountPath: '/etc/eyaml'
                  readOnly: true
                - name: eyrie-ssh-key
                  mountPath: '/root/.ssh/id_ed25519'
                  readOnly: true
          volumes:
            - name: nest
              hostPath:
                path: '/nest'
                type: Directory
            - name: bolt-config
              hostPath:
                path: '/etc/puppetlabs/bolt'
                type: Directory
            - name: eyaml-config
              hostPath:
                path: '/etc/eyaml'
                type: Directory
            - name: eyrie-ssh-key
              hostPath:
                path: '/root/.ssh/id_ed25519_eyrie'
                type: File

  representation-subthreshold-expiry-dry-run:
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: "%{nest::kubernetes::service}-representation-subthreshold-expiry-dry-run"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{nest::kubernetes::service}"
        component: representation-subthreshold-expiry
    spec:
      concurrencyPolicy: Forbid
      schedule: "%{lookup('representation_subthreshold_expiry_schedule')}"
      timeZone: 'America/New_York'
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          ttlSecondsAfterFinished: "%{alias('representation_subthreshold_expiry_job_ttl')}"
          template:
            metadata:
              labels:
                app: "%{nest::kubernetes::service}"
                component: representation-subthreshold-expiry
            spec:
              restartPolicy: Never
              affinity: *affinity
              tolerations: *tolerations
              containers:
                - name: dry-run
                  image: "%{lookup('postgres_image')}"
                  imagePullPolicy: IfNotPresent
                  command:
                    - /bin/sh
                    - -ceu
                    - |-
                      echo "honcho representation subthreshold expiry dry-run"
                      echo "threshold=${REPRESENTATION_BATCH_MAX_TOKENS} ttl=${SUBTHRESHOLD_REPRESENTATION_TTL} mode=dry-run"
                      psql --no-psqlrc --set=ON_ERROR_STOP=1 \
                        --set=threshold="${REPRESENTATION_BATCH_MAX_TOKENS}" \
                        --set=ttl="${SUBTHRESHOLD_REPRESENTATION_TTL}" <<'SQL'
                      \pset pager off
                      \pset border 2
                      \echo candidate summary
                      WITH grouped AS (
                        SELECT
                          q.work_unit_key,
                          count(*) AS row_count,
                          coalesce(sum(m.token_count), 0) AS total_tokens,
                          min(q.created_at) AS oldest_pending_at,
                          max(q.created_at) AS newest_pending_at
                        FROM queue q
                        LEFT JOIN messages m ON m.id = q.message_id
                        WHERE q.processed = false
                          AND q.task_type = 'representation'
                          AND q.work_unit_key IS NOT NULL
                          AND NOT EXISTS (
                            SELECT 1
                            FROM active_queue_sessions a
                            WHERE a.work_unit_key = q.work_unit_key
                          )
                        GROUP BY q.work_unit_key
                      ), candidates AS (
                        SELECT *
                        FROM grouped
                        WHERE total_tokens < :threshold
                          AND oldest_pending_at < now() - (:'ttl')::interval
                      )
                      SELECT
                        count(*) AS candidate_work_units,
                        coalesce(sum(row_count), 0) AS candidate_queue_rows,
                        coalesce(min(oldest_pending_at), now()) AS oldest_candidate_at,
                        coalesce(max(newest_pending_at), now()) AS newest_candidate_at,
                        coalesce(max(now() - oldest_pending_at), interval '0 seconds') AS oldest_candidate_age,
                        coalesce(round(avg(total_tokens)::numeric, 1), 0) AS avg_tokens
                      FROM candidates;
                      \echo oldest candidate samples: work_unit_key is md5-hashed; no message content is selected
                      WITH grouped AS (
                        SELECT
                          q.work_unit_key,
                          count(*) AS row_count,
                          coalesce(sum(m.token_count), 0) AS total_tokens,
                          min(q.created_at) AS oldest_pending_at,
                          max(q.created_at) AS newest_pending_at
                        FROM queue q
                        LEFT JOIN messages m ON m.id = q.message_id
                        WHERE q.processed = false
                          AND q.task_type = 'representation'
                          AND q.work_unit_key IS NOT NULL
                          AND NOT EXISTS (
                            SELECT 1
                            FROM active_queue_sessions a
                            WHERE a.work_unit_key = q.work_unit_key
                          )
                        GROUP BY q.work_unit_key
                      ), candidates AS (
                        SELECT *
                        FROM grouped
                        WHERE total_tokens < :threshold
                          AND oldest_pending_at < now() - (:'ttl')::interval
                      )
                      SELECT
                        md5(work_unit_key) AS work_unit_hash,
                        row_count,
                        total_tokens,
                        oldest_pending_at,
                        newest_pending_at,
                        now() - oldest_pending_at AS oldest_age
                      FROM candidates
                      ORDER BY oldest_pending_at ASC
                      LIMIT 20;
                      SQL
                  env:
                    - name: PGHOST
                      value: "%{nest::kubernetes::service}-cnpg-rw"
                    - name: PGPORT
                      value: '5432'
                    - name: PGDATABASE
                      value: "%{lookup('honcho_database')}"
                    - name: PGUSER
                      value: "%{lookup('honcho_user')}"
                    - name: PGPASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: "%{nest::kubernetes::service}-cnpg-app"
                          key: password
                    - name: REPRESENTATION_BATCH_MAX_TOKENS
                      value: "%{alias('representation_batch_max_tokens')}"
                    - name: SUBTHRESHOLD_REPRESENTATION_TTL
                      value: "%{lookup('representation_subthreshold_ttl')}"

  qwen-limiter-script:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{lookup('honcho_llama_qwen_limiter_service')}-script"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{lookup('honcho_llama_qwen_limiter_service')}"
        component: qwen-limiter
    data:
      limiter.py: |-
        import http.client
        import json
        import os
        import sys
        import threading
        from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

        MAX_CONCURRENT = int(os.environ.get('MAX_CONCURRENT', '2'))
        QUEUE_TIMEOUT_SECONDS = float(os.environ.get('QUEUE_TIMEOUT_SECONDS', '30'))
        UPSTREAM_HOST = os.environ.get('UPSTREAM_HOST', 'llama-qwen')
        UPSTREAM_PORT = int(os.environ.get('UPSTREAM_PORT', '80'))
        UPSTREAM_TIMEOUT_SECONDS = float(os.environ.get('UPSTREAM_TIMEOUT_SECONDS', '600'))

        semaphore = threading.BoundedSemaphore(MAX_CONCURRENT)
        active_lock = threading.Lock()
        active_upstream = 0

        HOP_BY_HOP_HEADERS = {
            'connection',
            'keep-alive',
            'proxy-authenticate',
            'proxy-authorization',
            'te',
            'trailer',
            'transfer-encoding',
            'upgrade',
        }

        def log(message):
            print(message, file=sys.stderr, flush=True)

        class LimiterHandler(BaseHTTPRequestHandler):
            protocol_version = 'HTTP/1.1'

            def do_GET(self):
                if self.path == '/limiter/status':
                    self.send_json(200, {
                        'status': 'ok',
                        'max_concurrent': MAX_CONCURRENT,
                        'active_upstream': active_upstream,
                        'queue_timeout_seconds': QUEUE_TIMEOUT_SECONDS,
                        'upstream': f'http://{UPSTREAM_HOST}:{UPSTREAM_PORT}',
                    })
                    return
                self.proxy()

            def do_HEAD(self):
                self.proxy()

            def do_POST(self):
                self.proxy()

            def do_PUT(self):
                self.proxy()

            def do_PATCH(self):
                self.proxy()

            def do_DELETE(self):
                self.proxy()

            def send_json(self, status, payload):
                data = json.dumps(payload, sort_keys=True).encode('utf-8')
                self.send_response(status)
                self.send_header('Content-Type', 'application/json')
                self.send_header('Content-Length', str(len(data)))
                self.end_headers()
                if self.command != 'HEAD':
                    self.wfile.write(data)

            def proxy(self):
                acquired = semaphore.acquire(timeout=QUEUE_TIMEOUT_SECONDS)
                if not acquired:
                    self.send_response(503)
                    self.send_header('Content-Type', 'application/json')
                    self.send_header('Retry-After', str(int(QUEUE_TIMEOUT_SECONDS)))
                    payload = json.dumps({
                        'error': 'honcho llama-qwen concurrency limit reached',
                        'max_concurrent': MAX_CONCURRENT,
                    }).encode('utf-8')
                    self.send_header('Content-Length', str(len(payload)))
                    self.end_headers()
                    if self.command != 'HEAD':
                        self.wfile.write(payload)
                    return

                global active_upstream
                with active_lock:
                    active_upstream += 1
                    current_active = active_upstream
                log(f'start method={self.command} path={self.path} active={current_active}/{MAX_CONCURRENT}')

                sent_response = False
                try:
                    content_length = int(self.headers.get('Content-Length', '0') or 0)
                    request_body = self.rfile.read(content_length) if content_length else None
                    headers = {
                        key: value
                        for key, value in self.headers.items()
                        if key.lower() not in HOP_BY_HOP_HEADERS and key.lower() != 'host'
                    }
                    headers['Host'] = UPSTREAM_HOST

                    conn = http.client.HTTPConnection(UPSTREAM_HOST, UPSTREAM_PORT, timeout=UPSTREAM_TIMEOUT_SECONDS)
                    conn.request(self.command, self.path, body=request_body, headers=headers)
                    response = conn.getresponse()
                    response_body = response.read()

                    self.send_response(response.status, response.reason)
                    sent_response = True
                    for key, value in response.getheaders():
                        lower_key = key.lower()
                        if lower_key in HOP_BY_HOP_HEADERS or lower_key == 'content-length':
                            continue
                        self.send_header(key, value)
                    self.send_header('Content-Length', str(len(response_body)))
                    self.send_header('X-Honcho-Qwen-Limiter-Max-Concurrent', str(MAX_CONCURRENT))
                    self.end_headers()
                    if self.command != 'HEAD' and response_body:
                        self.wfile.write(response_body)
                except Exception as exc:
                    log(f'upstream_error method={self.command} path={self.path} error={exc!r}')
                    if not sent_response:
                        self.send_json(502, {'error': 'honcho llama-qwen limiter upstream error'})
                finally:
                    with active_lock:
                        active_upstream -= 1
                        current_active = active_upstream
                    semaphore.release()
                    log(f'finish method={self.command} path={self.path} active={current_active}/{MAX_CONCURRENT}')

            def log_message(self, fmt, *args):
                log('%s - - [%s] %s' % (self.client_address[0], self.log_date_time_string(), fmt % args))

        if __name__ == '__main__':
            bind = ('0.0.0.0', int(os.environ.get('PORT', '8000')))
            server = ThreadingHTTPServer(bind, LimiterHandler)
            log(f'honcho llama-qwen limiter listening on {bind[0]}:{bind[1]} max_concurrent={MAX_CONCURRENT}')
            server.serve_forever()

  qwen-limiter-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{lookup('honcho_llama_qwen_limiter_service')}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: "%{lookup('honcho_llama_qwen_limiter_service')}"
          component: qwen-limiter
      template:
        metadata:
          labels:
            app: "%{lookup('honcho_llama_qwen_limiter_service')}"
            component: qwen-limiter
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: limiter
              image: "%{lookup('honcho_image')}"
              command:
                - /app/.venv/bin/python
                - /opt/honcho-qwen-limiter/limiter.py
              env:
                - name: MAX_CONCURRENT
                  value: "%{alias('honcho_llama_qwen_max_concurrent')}"
                - name: QUEUE_TIMEOUT_SECONDS
                  value: "%{alias('honcho_llama_qwen_queue_timeout_seconds')}"
                - name: UPSTREAM_HOST
                  value: "%{lookup('honcho_llama_qwen_upstream')}"
                - name: UPSTREAM_PORT
                  value: '80'
              ports:
                - name: http
                  containerPort: 8000
              readinessProbe:
                httpGet:
                  path: /limiter/status
                  port: 8000
                periodSeconds: 5
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /limiter/status
                  port: 8000
                periodSeconds: 10
                timeoutSeconds: 2
              volumeMounts:
                - name: limiter-script
                  mountPath: /opt/honcho-qwen-limiter
                  readOnly: true
          volumes:
            - name: limiter-script
              configMap:
                name: "%{lookup('honcho_llama_qwen_limiter_service')}-script"

  qwen-limiter-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{lookup('honcho_llama_qwen_limiter_service')}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{lookup('honcho_llama_qwen_limiter_service')}"
        component: qwen-limiter
    spec:
      type: ClusterIP
      selector:
        app: "%{lookup('honcho_llama_qwen_limiter_service')}"
        component: qwen-limiter
      ports:
        - name: http
          port: 80
          targetPort: 8000

  certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{nest::kubernetes::fqdn}"

  postgres-cluster:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: "%{nest::kubernetes::service}-cnpg"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      instances: 1
      imageName: "%{lookup('postgres_image')}"
      bootstrap:
        initdb:
          database: "%{lookup('honcho_database')}"
          owner: "%{lookup('honcho_user')}"
          postInitApplicationSQL:
            - CREATE EXTENSION IF NOT EXISTS vector;
      storage:
        storageClass: "%{lookup('postgres_storage_class')}"
        size: "%{lookup('postgres_storage_size')}"
      affinity:
        nodeSelector:
          "node-role.kubernetes.io/%{lookup('node_role')}": ''
        tolerations: *tolerations

  redis-storage:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('redis_storage_size')}"
      storageClassName: "%{lookup('redis_storage_class')}"

  redis-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}-redis"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}-redis"
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: redis
              image: docker.io/library/redis:8.2
              ports:
                - name: redis
                  containerPort: 6379
              volumeMounts:
                - name: data
                  mountPath: /data
              readinessProbe:
                exec:
                  command: ['redis-cli', 'ping']
                periodSeconds: 5
                timeoutSeconds: 2
              livenessProbe:
                exec:
                  command: ['redis-cli', 'ping']
                periodSeconds: 10
                timeoutSeconds: 2
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-redis"

  redis-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}-redis"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}-redis"
      ports:
        - name: redis
          port: 6379
          targetPort: 6379

  api-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-api"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
          component: api
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            component: api
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: api
              image: "%{lookup('honcho_image')}"
              command: ['sh', 'docker/entrypoint.sh']
              env: *honcho_env
              ports:
                - name: http
                  containerPort: 8000
              startupProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                failureThreshold: 30
                timeoutSeconds: 2
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 5
                failureThreshold: 3
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                failureThreshold: 6
                timeoutSeconds: 2

  deriver-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-deriver"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
          component: deriver
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            component: deriver
        spec:
          affinity: *affinity
          tolerations: *tolerations
          containers:
            - name: deriver
              image: "%{lookup('honcho_image')}"
              command: ['/app/.venv/bin/python', '-m', 'src.deriver']
              env: *honcho_env

  api-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        joyfullee.me/fqdn: "%{nest::kubernetes::fqdn}"
        joyfullee.me/service_name: "%{nest::kubernetes::service_name}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
        component: api
      ports:
        - name: http
          port: 80
          targetPort: 8000

  ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      annotations:
        projectcontour.io/response-timeout: infinity
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      tls:
        - secretName: "%{nest::kubernetes::service}-certs"
          hosts:
            - "%{nest::kubernetes::fqdn}"
      rules:
        - host: "%{nest::kubernetes::fqdn}"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: "%{nest::kubernetes::service}"
                    port:
                      name: http
