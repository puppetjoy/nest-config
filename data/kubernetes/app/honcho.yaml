---
plan_base: 'nest::eyrie::ai::honcho'
service_name: "%{nest::kubernetes::service}"

cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
honcho_image: registry.eyrie/nest/forks/honcho:honcho-v3-0-8-nest-dream-tool-length-retry
honcho_database: honcho
honcho_user: honcho
ingress_class: contour-compute
node_role: compute
postgres_image: ghcr.io/cloudnative-pg/postgresql:17.6
postgres_storage_class: owl-crypt
postgres_storage_size: 16Gi
redis_storage_class: owl-crypt
redis_storage_size: 1Gi
honcho_llama_qwen_limiter_service: llama-qwen-honcho
honcho_llama_qwen_base_url: "http://%{lookup('honcho_llama_qwen_limiter_service')}/v1"
honcho_llama_qwen_upstream: llama-qwen
honcho_llama_qwen_max_concurrent: '2'
honcho_llama_qwen_queue_timeout_seconds: '30'
representation_batch_max_tokens: '1024'
representation_subthreshold_ttl: '7 days'
representation_subthreshold_expiry_schedule: '17 */6 * * *'
representation_subthreshold_expiry_job_ttl: 21600

.affinity: &affinity
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists

.tolerations: &tolerations
  - key: "node-role.kubernetes.io/%{lookup('node_role')}"
    operator: Exists
    effect: NoSchedule

.honcho_env: &honcho_env
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: "%{nest::kubernetes::service}-cnpg-app"
        key: password
  - name: DB_CONNECTION_URI
    value: "postgresql+psycopg://%{lookup('honcho_user')}:$(POSTGRES_PASSWORD)@%{nest::kubernetes::service}-cnpg-rw:5432/%{lookup('honcho_database')}"
  - name: CACHE_URL
    value: "redis://%{nest::kubernetes::service}-redis:6379/0?suppress=true"
  - name: CACHE_ENABLED
    value: 'true'
  - name: AUTH_USE_AUTH
    value: 'false'

  # Local OpenAI-compatible embedding endpoint.  BGE-M3 emits 1024-dimensional
  # vectors, so this config must be deployed together with the reviewed
  # pgvector schema/re-embedding migration; deploying it against the existing
  # 1536-dimensional OpenAI embeddings will fail Honcho's startup validator.
  - name: EMBEDDING_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: EMBEDDING_MODEL_CONFIG__MODEL
    value: 'bge-m3'
  - name: EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: 'http://honcho-embeddings/v1'
  - name: EMBEDDING_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: EMBEDDING_MODEL_CONFIG__DIMENSIONS_MODE
    value: 'never'
  - name: EMBEDDING_VECTOR_DIMENSIONS
    value: '1024'
  - name: EMBEDDING_MAX_INPUT_TOKENS
    value: '8192'
  - name: EMBEDDING_MAX_TOKENS_PER_REQUEST
    value: '8192'

  # Honcho's OpenAI transport requires an API key value even for local
  # OpenAI-compatible services; llama.cpp ignores the placeholder.
  - name: HONCHO_LOCAL_OPENAI_API_KEY
    value: 'not-a-real-key'

  # Keep Honcho's local Qwen calls bounded so slow generations do not hold the
  # two allowed llama-qwen slots for long 1000+ token responses.  The model,
  # endpoint, and 2-of-4 slot topology stay unchanged; these caps only apply
  # downward pressure to generated output length, input context, dialectic
  # prefetch/history volume, and common-path tool loops.
  - name: LLM_DEFAULT_MAX_TOKENS
    value: '1024'
  - name: LLM_MAX_TOOL_OUTPUT_CHARS
    value: '1200'
  - name: LLM_MAX_MESSAGE_CONTENT_CHARS
    value: '400'
  - name: GET_CONTEXT_MAX_TOKENS
    value: '16000'
  - name: DERIVER_MAX_INPUT_TOKENS
    value: '12000'
  - name: DERIVER_WORKING_REPRESENTATION_MAX_OBSERVATIONS
    value: '32'
  - name: DERIVER_MODEL_CONFIG__MAX_OUTPUT_TOKENS
    value: '512'
  - name: SUMMARY_MAX_TOKENS_SHORT
    value: '512'
  - name: SUMMARY_MAX_TOKENS_LONG
    value: '1536'
  - name: DIALECTIC_MAX_INPUT_TOKENS
    value: '10000'
  - name: DIALECTIC_HISTORY_TOKEN_LIMIT
    value: '2048'
  - name: DIALECTIC_SESSION_HISTORY_MAX_TOKENS
    value: '1024'
  - name: DIALECTIC_PREFETCH_OBSERVATIONS_MINIMAL
    value: '4'
  - name: DIALECTIC_PREFETCH_OBSERVATIONS_DEFAULT
    value: '12'
  - name: DIALECTIC_MAX_OUTPUT_TOKENS
    value: '1024'
  - name: DIALECTIC_LEVELS__minimal__MAX_OUTPUT_TOKENS
    value: '250'
  - name: DIALECTIC_LEVELS__low__MAX_OUTPUT_TOKENS
    value: '512'
  - name: DIALECTIC_LEVELS__medium__MAX_OUTPUT_TOKENS
    value: '768'
  - name: DIALECTIC_LEVELS__high__MAX_OUTPUT_TOKENS
    value: '1024'
  - name: DIALECTIC_LEVELS__max__MAX_OUTPUT_TOKENS
    value: '1536'
  - name: DIALECTIC_LEVELS__low__MAX_TOOL_ITERATIONS
    value: '1'
  - name: DIALECTIC_LEVELS__minimal__TOOL_CHOICE
    value: 'none'
  - name: DIALECTIC_LEVELS__low__TOOL_CHOICE
    value: 'none'
  - name: DIALECTIC_LEVELS__high__MAX_TOOL_ITERATIONS
    value: '3'
  - name: DIALECTIC_LEVELS__max__MAX_TOOL_ITERATIONS
    value: '4'
  - name: DREAM_DEDUCTION_MODEL_CONFIG__MAX_OUTPUT_TOKENS
    value: '1024'
  - name: DREAM_INDUCTION_MODEL_CONFIG__MAX_OUTPUT_TOKENS
    value: '1024'

  # Dream cycles were still producing large prompts and length-finished local
  # Qwen calls after no-thinking/output-cap tuning.  Keep truncation detection
  # intact and reduce dream context/tool pressure instead of raising caps or
  # limiter concurrency: shorter tool/message previews, shorter history, fewer
  # tool iterations, fewer high-surprisal hint observations, and smaller bounded
  # final generations make each failed cycle cheaper while still rejecting
  # partial outputs instead of recording them as durable dream progress.
  - name: DREAM_MAX_INPUT_TOKENS
    value: '6000'
  - name: DREAM_MAX_TOOL_ITERATIONS
    value: '2'
  - name: DREAM_HISTORY_TOKEN_LIMIT
    value: '768'
  - name: DREAM_SURPRISAL__SAMPLE_SIZE
    value: '12'
  - name: DREAM_SURPRISAL__TOP_PERCENT_SURPRISAL
    value: '0.01'
  - name: DERIVER_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DERIVER_MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DERIVER_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DERIVER_MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__CHAT_TEMPLATE_KWARGS__ENABLE_THINKING
    value: 'false'
  - name: DERIVER_MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__LENGTH_RETRY_MAX_TOKENS
    value: '256'
  - name: SUMMARY_MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: SUMMARY_MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: SUMMARY_MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: SUMMARY_MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__CHAT_TEMPLATE_KWARGS__ENABLE_THINKING
    value: 'false'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__CHAT_TEMPLATE_KWARGS__ENABLE_THINKING
    value: 'false'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__CHAT_TEMPLATE_KWARGS__ENABLE_THINKING
    value: 'false'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
    value: 'HONCHO_LOCAL_OPENAI_API_KEY'
  - name: DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__CHAT_TEMPLATE_KWARGS__ENABLE_THINKING
    value: 'false'
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT
    value: 'openai'
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL
    value: 'llama-qwen'
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL
    value: "%{lookup('honcho_llama_qwen_base_url')}"
  - name: DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__API_KEY_ENV
