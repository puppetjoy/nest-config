  - name: DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__PROVIDER_PARAMS__CHAT_TEMPLATE_KWARGS__ENABLE_THINKING
    value: 'false'
  - name: DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT
