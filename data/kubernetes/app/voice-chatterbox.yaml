---
# ROCm-backed Chatterbox-Turbo candidate service for accepted Talon/Star generated-reference presets.
# This is deliberately separate from the stable Kokoro/Whisper voice-speech service.
cache_size: 80Gi
storage_class: owl-crypt
image: docker.io/rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.9.1
chatterbox_source: git+https://github.com/resemble-ai/chatterbox.git@3f35dfc8fbe63e5b29793289dc68f1875bb317a5

resources:
  backup: {}
  restore: {}
  registry_auths: {}

  cache:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-cache"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('cache_size')}"
      storageClassName: "%{lookup('storage_class')}"

  app:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-app"
      namespace: "%{nest::kubernetes::namespace}"
    data:
      constraints.txt: |
        # Preserve the ROCm PyTorch stack provided by the base image.
        # Chatterbox is installed with --no-deps because upstream pins CUDA-era
        # torch==2.6.0/torchaudio==2.6.0 on Python 3.12.
        torch==2.9.1+rocm7.2.4.git39497456
        torchaudio==2.9.1+rocm7.2.4.git39497456
      server.py: |
        import hashlib
        import importlib.metadata
        import io
        import json
        import os
        import threading
        import time
        from pathlib import Path

        import numpy as np
        import soundfile as sf
        import torch
        from fastapi import FastAPI, HTTPException
        from fastapi.responses import Response
        from pydantic import BaseModel

        from chatterbox.tts_turbo import ChatterboxTurboTTS

        app = FastAPI(title='Nest voice-chatterbox', version='0.1.0')
        device = 'cuda' if torch.cuda.is_available() else 'cpu'
        lock = threading.Lock()
        model = None
        model_loaded_at = None

        PRESET_ROOT = Path('/presets')
        PRESETS_PATH = PRESET_ROOT / 'presets.json'
        with PRESETS_PATH.open() as fh:
            preset_manifest = json.load(fh)

        presets = {preset['preset']: preset for preset in preset_manifest['presets']}
        active_aliases = {}
        pending_aliases = {
            preset.get('alias_after_final_approval'): preset['preset']
            for preset in preset_manifest['presets']
            if preset.get('alias_after_final_approval')
        }

        PRONUNCIATIONS = [
            ('KubeCM', 'cube see em'),
            ('kubectl', 'cube control'),
            ('Eyrie', 'airy'),
            ('OpenVox', 'open vox'),
            ('ROCm', 'rock em'),
        ]

        class SpeechRequest(BaseModel):
            input: str
            model: str = 'chatterbox-turbo'
            voice: str = 'talon-elegant'
            response_format: str = 'wav'
            speed: float = 1.0
            normalize: bool = True


        def dependency_version(name):
            try:
                return importlib.metadata.version(name)
            except Exception:
                return None


        def normalize_for_tts(text: str):
            normalized = text
            for source, replacement in PRONUNCIATIONS:
                normalized = normalized.replace(source, replacement)
            return ' '.join(normalized.split()).strip()


        def sha256(path: Path):
            return hashlib.sha256(path.read_bytes()).hexdigest()


        def resolve_voice(voice: str):
            preset_name = active_aliases.get(voice, voice)
            if preset_name not in presets:
                if voice in pending_aliases:
                    raise HTTPException(status_code=409, detail=f'Voice alias {voice!r} is pending final approval; use {pending_aliases[voice]!r}')
                raise HTTPException(status_code=400, detail=f'Unsupported Chatterbox voice: {voice}')
            return preset_name, presets[preset_name]


        def get_model():
            global model, model_loaded_at
            if model is None:
                started = time.perf_counter()
                model = ChatterboxTurboTTS.from_pretrained(device=device)
                model_loaded_at = time.perf_counter() - started
            return model


        def write_wav(audio, sample_rate: int):
            data = audio.detach().cpu().numpy() if hasattr(audio, 'detach') else np.asarray(audio)
            data = np.squeeze(data).astype(np.float32, copy=False)
            out = io.BytesIO()
            sf.write(out, data, sample_rate, format='WAV')
            return out.getvalue(), len(data) / sample_rate


        @app.get('/health')
        def health():
            reference_state = {}
            for name, preset in presets.items():
                path = PRESET_ROOT / name / 'reference.wav'
                reference_state[name] = {
                    'exists': path.exists(),
                    'sha256_ok': path.exists() and sha256(path) == preset.get('reference_sha256'),
                }
            return {
                'ok': True,
                'version': app.version,
                'model_loaded': model is not None,
                'model_load_seconds': round(model_loaded_at, 3) if model_loaded_at else None,
                'torch': torch.__version__,
                'hip': getattr(torch.version, 'hip', None),
                'cuda_available': torch.cuda.is_available(),
                'device': torch.cuda.get_device_name(0) if torch.cuda.is_available() else None,
                'chatterbox_tts': dependency_version('chatterbox-tts'),
                'aliases_active': active_aliases,
                'aliases_pending_final_approval': pending_aliases,
                'voices': sorted(presets.keys()),
                'reference_state': reference_state,
                'norm_loudness': False,
                'production_tts_changed': False,
            }


        @app.get('/v1/audio/voices')
        def voices():
            return {
                'default': 'talon-elegant',
                'recommended': sorted(presets.keys()),
                'aliases_active': active_aliases,
                'aliases_pending_final_approval': pending_aliases,
                'data': [
                    {
                        'id': name,
                        'object': 'voice',
                        'persona': preset.get('persona'),
                        'source_candidate': preset.get('source_candidate'),
                        'reference_sha256': preset.get('reference_sha256'),
                    }
                    for name, preset in sorted(presets.items())
                ],
            }


        @app.get('/v1/models')
        def models():
            return {'data': [{'id': 'chatterbox-turbo', 'object': 'model', 'owned_by': 'nest'}]}


        @app.post('/v1/audio/speech')
        def speech(request: SpeechRequest):
            if request.response_format != 'wav':
                raise HTTPException(status_code=400, detail='Only wav response_format is currently supported')
            if request.model not in ('chatterbox-turbo', 'chatterbox'):
                raise HTTPException(status_code=400, detail='Only chatterbox-turbo model is currently supported')
            if request.speed != 1.0:
                raise HTTPException(status_code=400, detail='Chatterbox-Turbo provider does not support speed changes yet')
            preset_name, preset = resolve_voice(request.voice)
            reference = PRESET_ROOT / preset_name / 'reference.wav'
            if not reference.exists():
                raise HTTPException(status_code=500, detail=f'Reference audio missing for {preset_name}')
            if sha256(reference) != preset.get('reference_sha256'):
                raise HTTPException(status_code=500, detail=f'Reference audio SHA256 mismatch for {preset_name}')
            input_text = normalize_for_tts(request.input) if request.normalize else request.input
            started = time.perf_counter()
            with lock:
                tts = get_model()
                audio = tts.generate(input_text, audio_prompt_path=str(reference), norm_loudness=False)
            elapsed = time.perf_counter() - started
            content, duration = write_wav(audio, tts.sr)
            headers = {
                'X-Nest-TTS-Provider': 'chatterbox-turbo',
                'X-Nest-TTS-Voice': preset_name,
                'X-Nest-TTS-Normalized': str(request.normalize).lower(),
                'X-Nest-TTS-Norm-Loudness': 'false',
                'X-Nest-TTS-Seconds': f'{duration:.3f}',
                'X-Nest-TTS-Wall-Seconds': f'{elapsed:.3f}',
                'X-Nest-TTS-RTF': f'{elapsed / duration:.3f}' if duration else '0',
            }
            return Response(content=content, media_type='audio/wav', headers=headers)


        if __name__ == '__main__':
            import uvicorn
            uvicorn.run(app, host='0.0.0.0', port=8080)


  presets:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-presets"
      namespace: "%{nest::kubernetes::namespace}"
    data:
      presets.json: |
        {
          "schema": 1,
          "purpose": "Generated-reference Chatterbox candidate presets for future local Talon/Star review; not a production provider switch.",
          "production_tts_changed": false,
          "no_user_recordings": true,
          "source_artifact_dir": "/home/joy/projects/.worktrees/hermes-agent/t_b09f8cd2/artifacts/chatterbox-voice-grid-20260610T071928Z",
          "source_request_id": "ar-20260610-071520-ea6b74",
          "productionization_request_id": "ar-20260610-074245-1df476",
          "task_id": "t_e9f23762",
          "runtime_notes": {
            "model": "ResembleAI Chatterbox-Turbo",
            "source_repo": "https://github.com/resemble-ai/chatterbox",
            "source_commit": "3f35dfc8fbe63e5b29793289dc68f1875bb317a5",
            "torch": "2.9.1+rocm7.2.4.git39497456",
            "hip": "7.2.53211-97f5574fe2",
            "gpu": "Radeon 8060S Graphics",
            "norm_loudness": false,
            "norm_loudness_note": "The evaluation disabled Chatterbox loudness normalization to avoid the known ROCm float64 reference-audio tokenizer failure; production should cast normalized references back to float32 or keep this explicit setting."
          },
          "stt_context_prompt": "Talon Star Honcho Eyrie KubeCM llama-qwen GitLab Puppet Kubernetes OpenVox ROCm kubectl owl voice-speech Chatterbox Kokoro",
          "presets": [
            {
              "preset": "talon-elegant",
              "persona": "talon",
              "source_candidate": "star-alloy-elegant",
              "alias_after_final_approval": "talon",
              "reference_path": "files/app/voice-speech/chatterbox-presets/talon-elegant/reference.wav",
              "reference_sha256": "41a7d95035c73b5c77de3af38c9b74fef11a3aac32a5b3dcdbebad949db1f600",
              "source_reference_sha256": "41a7d95035c73b5c77de3af38c9b74fef11a3aac32a5b3dcdbebad949db1f600",
              "reference_voice": "af_alloy",
              "reference_style": "elegant neutral assistant distinct from Talon",
              "description": "Talon candidate: warm, focused, clever, clear, calm ops voice; owl-ish without baby/chibi tone."
            },
            {
              "preset": "star-clear",
              "persona": "star",
              "source_candidate": "star-nova-clear",
              "alias_after_final_approval": "star",
              "reference_path": "files/app/voice-speech/chatterbox-presets/star-clear/reference.wav",
              "reference_sha256": "40faa648c03da6dc1fd466d1d9dd3178ae88acf21107d6b24926dc3e8391360d",
              "source_reference_sha256": "40faa648c03da6dc1fd466d1d9dd3178ae88acf21107d6b24926dc3e8391360d",
              "reference_voice": "af_nova",
              "reference_style": "clear friendly shopping/browser assistant",
              "description": "Star candidate: clear, bright, soft, friendly operations voice for local Chatterbox review."
            }
          ],
          "activation_request_id": "ar-20260610-080347-4ed687",
          "activation_task_id": "t_d1503049"
        }


  talon_reference:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-talon-reference"
      namespace: "%{nest::kubernetes::namespace}"
    binaryData:
      reference.wav: 

  star_reference:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-star-reference"
      namespace: "%{nest::kubernetes::namespace}"
    binaryData:
      reference.wav: 

  deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
        spec:
          nodeSelector:
            kubernetes.io/hostname: owl
          tolerations: "%{alias('tolerations')}"
          containers:
            - name: voice-chatterbox
              image: "%{lookup('image')}"
              imagePullPolicy: IfNotPresent
              command: ['/bin/bash', '-lc']
              args:
                - |
                  set -euo pipefail
                  mkdir -p /cache/pip /cache/huggingface /cache/miopen
                  export PIP_CACHE_DIR=/cache/pip
                  export XDG_CACHE_HOME=/cache
                  export HF_HOME=/cache/huggingface
                  export MIOPEN_USER_DB_PATH=/cache/miopen
                  export PIP_CONSTRAINT=/app/constraints.txt
                  python3 -m pip install --root-user-action=ignore --no-deps "%{lookup('chatterbox_source')}"
                  python3 -m pip install --root-user-action=ignore \
                    'numpy>=1.24.0,<2.0.0' \
                    'librosa==0.11.0' \
                    'transformers==5.2.0' \
                    'diffusers==0.29.0' \
                    'safetensors==0.5.3' \
                    'spacy-pkuseg' \
                    'pykakasi==2.3.0' \
                    'pyloudnorm' \
                    'omegaconf' \
                    'soundfile==0.14.0' \
                    'fastapi==0.136.3' \
                    'uvicorn==0.49.0' \
                    'einops' \
                    'onnx' \
                    'tqdm' \
                    'bitstring' \
                    'praat-parselmouth' \
                    'pydub' \
                    'pyrubberband' \
                    'pywavelets' \
                    'scikit-learn' \
                    'sox' \
                    'tabulate' \
                    'tensorboard'
                  # These packages declare generic torch/torchaudio dependencies that
                  # pip cannot satisfy from PyPI for the ROCm-local torch build. The
                  # base image already carries the ROCm torch stack, so install their
                  # non-torch dependencies above and install the packages themselves
                  # without dependency resolution.
                  python3 -m pip install --root-user-action=ignore --no-deps \
                    's3tokenizer' \
                    'conformer==0.3.2' \
                    'resemble-perth @ git+https://github.com/resemble-ai/Perth.git@master'
                  python3 - <<'PY'
                  import torch
                  assert torch.__version__.startswith('2.9.1+rocm7.2.4'), torch.__version__
                  assert getattr(torch.version, 'hip', None), 'ROCm/HIP torch is required'
                  PY
                  exec python3 /app/server.py
              env:
                - name: MIOPEN_FIND_MODE
                  value: '2'
                - name: TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL
                  value: '1'
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: '4'
                  memory: 16Gi
                  squat.ai/gpu: '1'
                limits:
                  cpu: '12'
                  memory: 48Gi
                  squat.ai/gpu: '1'
              volumeMounts:
                - name: app
                  mountPath: /app
                  readOnly: true
                - name: presets
                  mountPath: /presets/presets.json
                  subPath: presets.json
                  readOnly: true
                - name: talon-reference
                  mountPath: /presets/talon-elegant/reference.wav
                  subPath: reference.wav
                  readOnly: true
                - name: star-reference
                  mountPath: /presets/star-clear/reference.wav
                  subPath: reference.wav
                  readOnly: true
                - name: cache
                  mountPath: /cache
              startupProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 10
                failureThreshold: 240
                timeoutSeconds: 2
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 10
                failureThreshold: 3
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 30
                failureThreshold: 3
                timeoutSeconds: 2
          volumes:
            - name: app
              configMap:
                name: "%{nest::kubernetes::service}-app"
            - name: presets
              configMap:
                name: "%{nest::kubernetes::service}-presets"
            - name: talon-reference
              configMap:
                name: "%{nest::kubernetes::service}-talon-reference"
            - name: star-reference
              configMap:
                name: "%{nest::kubernetes::service}-star-reference"
            - name: cache
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-cache"

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
      ports:
        - name: http
          port: 80
          targetPort: 8080
