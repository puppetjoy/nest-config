---
include:
  - 'nest::service::puppet'

node_role: compute
postgres_image: ghcr.io/cloudnative-pg/postgresql:17.6
postgres_storage_class: owl-crypt
postgres_storage_size: 16Gi
plan_base: nest::eyrie::openvox
service_name: "%{nest::kubernetes::service}"

resources:
  registry_auths: {}

  init:
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: "%{nest::kubernetes::service}-init"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        'james.tl/nest': 'stage1'
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 21600
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets: []
          initContainers: []
          containers:
            - name: done
              image: "%{lookup('config_registry')}/nest/stage1/server"
              imagePullPolicy: IfNotPresent
              command: ['true']
          volumes: []

  postgres-cluster:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: "%{nest::kubernetes::main_service}-cnpg"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      instances: 1
      imageName: "%{lookup('postgres_image')}"
      bootstrap:
        initdb:
          database: openvoxdb
          owner: puppetdb
          postInitApplicationSQL:
            - CREATE EXTENSION IF NOT EXISTS pg_trgm;
            - CREATE EXTENSION IF NOT EXISTS pgcrypto;
      storage:
        storageClass: "%{lookup('postgres_storage_class')}"
        size: "%{lookup('postgres_storage_size')}"
      affinity:
        nodeSelector:
          "node-role.kubernetes.io/%{lookup('node_role')}": ''
        tolerations:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists
            effect: NoSchedule

  r10k-code-creds:
    apiVersion: v1
    kind: Secret
    metadata:
      name: "%{nest::kubernetes::main_service}-r10k-code-creds"
      namespace: "%{nest::kubernetes::namespace}"
    type: Opaque
    data:
      id_rsa: "%{nest::service::puppet::r10k_deploy_key_base64}"
      known_hosts: "%{nest::service::puppet::r10k_known_hosts_base64}"

  puppetboard-secrets:
    apiVersion: v1
    kind: Secret
    metadata:
      name: "%{nest::kubernetes::main_service}-puppetboard-secrets"
      namespace: "%{nest::kubernetes::namespace}"
    type: Opaque
    data:
      SECRET_KEY: "%{nest::service::puppet::puppetboard_secret_key_base64}"

  puppetboard-client-cert-serviceaccount:
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard-client-cert"
      namespace: "%{nest::kubernetes::namespace}"

  puppetboard-client-cert-role:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard-client-cert"
      namespace: "%{nest::kubernetes::namespace}"
    rules:
      - apiGroups: ['']
        resources: [pods]
        verbs: [get, list, watch]
      - apiGroups: ['']
        resources: [pods/exec]
        verbs: [create]
      - apiGroups: [apps]
        resources: [deployments]
        verbs: [get, list, watch]

  puppetboard-client-cert-rolebinding:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard-client-cert"
      namespace: "%{nest::kubernetes::namespace}"
    subjects:
      - kind: ServiceAccount
        name: "%{nest::kubernetes::service}-puppetboard-client-cert"
        namespace: "%{nest::kubernetes::namespace}"
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: "%{nest::kubernetes::service}-puppetboard-client-cert"

  puppetboard-certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-puppetboard-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{lookup('puppetboard_fqdn')}"

  puppetboard-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard"
      namespace: "%{nest::kubernetes::namespace}"
      labels: &puppetboard_labels
        app.kubernetes.io/name: puppetboard
        app.kubernetes.io/instance: "%{nest::kubernetes::service}"
        app.kubernetes.io/component: puppetboard
    spec:
      replicas: 1
      selector:
        matchLabels: *puppetboard_labels
      template:
        metadata:
          labels: *puppetboard_labels
        spec:
          serviceAccountName: "%{nest::kubernetes::service}-puppetboard-client-cert"
          nodeSelector:
            "node-role.kubernetes.io/%{lookup('node_role')}": ''
          tolerations:
            - key: "node-role.kubernetes.io/%{lookup('node_role')}"
              operator: Exists
              effect: NoSchedule
          initContainers:
            - name: puppetdb-client-cert
              image: registry.eyrie/nest/stage1/server
              imagePullPolicy: IfNotPresent
              env:
                - name: CERTNAME
                  value: "%{lookup('puppetboard_certname')}"
                - name: NAMESPACE
                  value: "%{nest::kubernetes::namespace}"
                - name: SERVICE
                  value: "%{nest::kubernetes::service}"
              command:
                - /bin/sh
                - -ec
                - |
                  kubectl rollout status -n "${NAMESPACE}" "deploy/${SERVICE}-puppetserver" --timeout=240s

                  pod=$(kubectl get pod -n "${NAMESPACE}" \
                    -l "app.kubernetes.io/component=puppetserver,app.kubernetes.io/instance=${SERVICE}" \
                    --sort-by=.metadata.creationTimestamp \
                    -o name | tail -n 1 | cut -d / -f 2)
                  container=$(kubectl get deploy -n "${NAMESPACE}" "${SERVICE}-puppetserver" \
                    -o jsonpath='{.spec.template.spec.containers[0].name}')

                  kubectl exec -n "${NAMESPACE}" "${pod}" -c "${container}" -- \
                    /bin/sh -ec '
                      certname="$1"
                      if [ ! -f "/etc/puppetlabs/puppet/ssl/certs/${certname}.pem" ]; then
                        puppetserver ca generate --certname "${certname}"
                      fi
                    ' sh "${CERTNAME}"

                  kubectl exec -n "${NAMESPACE}" "${pod}" -c "${container}" -- \
                    cat /etc/puppetlabs/puppet/ssl/certs/ca.pem > /etc/puppetboard/puppetdb/ca.pem
                  kubectl exec -n "${NAMESPACE}" "${pod}" -c "${container}" -- \
                    cat "/etc/puppetlabs/puppet/ssl/certs/${CERTNAME}.pem" > /etc/puppetboard/puppetdb/cert.pem
                  kubectl exec -n "${NAMESPACE}" "${pod}" -c "${container}" -- \
                    cat "/etc/puppetlabs/puppet/ssl/private_keys/${CERTNAME}.pem" > /etc/puppetboard/puppetdb/key.pem
                  chmod 0444 /etc/puppetboard/puppetdb/ca.pem /etc/puppetboard/puppetdb/cert.pem /etc/puppetboard/puppetdb/key.pem
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - all
              volumeMounts:
                - name: puppetdb-client-certs
                  mountPath: /etc/puppetboard/puppetdb
          containers:
            - name: puppetboard
              image: ghcr.io/voxpupuli/puppetboard:7.0.2
              imagePullPolicy: IfNotPresent
              env:
                - name: PUPPETDB_HOST
                  value: "%{nest::kubernetes::service}-puppetdb"
                - name: PUPPETDB_PORT
                  value: '8081'
                - name: PUPPETDB_PROTO
                  value: https
                - name: PUPPETDB_SSL_VERIFY
                  value: /etc/puppetboard/puppetdb/ca.pem
                - name: PUPPETDB_CERT
                  value: /etc/puppetboard/puppetdb/cert.pem
                - name: PUPPETDB_KEY
                  value: /etc/puppetboard/puppetdb/key.pem
                - name: PUPPETBOARD_PORT
                  value: '9090'
                - name: DEFAULT_ENVIRONMENT
                  value: main
                - name: ENABLE_CATALOG
                  value: 'True'
                - name: UNRESPONSIVE_HOURS
                  value: '8760'
              envFrom:
                - secretRef:
                    name: "%{nest::kubernetes::main_service}-puppetboard-secrets"
              ports:
                - name: puppetboard
                  containerPort: 9090
              volumeMounts:
                - name: puppetdb-client-certs
                  mountPath: /etc/puppetboard/puppetdb
                  readOnly: true
              readinessProbe:
                httpGet:
                  path: /
                  port: puppetboard
                initialDelaySeconds: 5
                periodSeconds: 10
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - all
                runAsGroup: 999
                runAsNonRoot: true
                runAsUser: 999
          volumes:
            - name: puppetdb-client-certs
              emptyDir: {}

  puppetboard-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ports:
        - name: puppetboard
          port: 9090
          targetPort: puppetboard
      selector: *puppetboard_labels

  puppetboard-ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      rules:
        - host: "%{lookup('puppetboard_fqdn')}"
          http:
            paths:
              - path: /
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: "%{nest::kubernetes::service}-puppetboard"
                    port:
                      number: 9090
      tls:
        - secretName: "%{nest::kubernetes::service}-puppetboard-certs"
          hosts:
            - "%{lookup('puppetboard_fqdn')}"

  puppetdb-certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-puppetdb-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-puppetdb-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{lookup('puppetdb_fqdn')}"

  puppetdb-ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}-puppetdb"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      rules:
        - host: "%{lookup('puppetdb_fqdn')}"
          http:
            paths:
              - path: /
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: "%{nest::kubernetes::service}-puppetdb"
                    port:
                      number: 8080
      tls:
        - secretName: "%{nest::kubernetes::service}-puppetdb-certs"
          hosts:
            - "%{lookup('puppetdb_fqdn')}"

values:
  nodeSelector:
    "node-role.kubernetes.io/%{lookup('node_role')}": ''
  tolerations:
    - key: "node-role.kubernetes.io/%{lookup('node_role')}"
      operator: Exists
      effect: NoSchedule
  global:
    curl:
      image: docker.io/curlimages/curl
    extraEnv:
      PUPPETSERVER_ENVIRONMENT_TIMEOUT: '0'
    postgresql:
      auth:
        database: openvoxdb
        existingSecret: "%{nest::kubernetes::main_service}-cnpg-app"
  storage:
    storageClass: "%{lookup('storage_class')}"
  puppetserver:
    tag: 8-latest
    puppeturl: 'git@gitlab.joyfullee.me:nest/config.git'
    puppetbasedir: /etc/puppetlabs/code/environments
    persistence:
      ca:
        storageClass: "%{lookup('storage_class')}"
        accessModes: [ReadWriteOnce]
        size: 1Gi
      code:
        storageClass: "%{lookup('storage_class')}"
        accessModes: [ReadWriteMany]
        size: 4Gi
      data:
        storageClass: "%{lookup('storage_class')}"
        accessModes: [ReadWriteOnce]
        size: 1Gi
    masters:
      fqdns:
        alternateServerNames: "%{alias('puppet_server_alt_names')}"
      service:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/allow-shared-ip: "%{lookup('puppet_load_balancer_ip')}"
        loadBalancerIP: "%{lookup('puppet_load_balancer_ip')}"
      ingress:
        enabled: false
    customentrypoints:
      enabled: true
      configmaps:
        05-set-server-certname.sh: |-
          #!/bin/sh
          set -eu

          certname="%{lookup('puppet_server_certname')}"
          alt_names="puppet,%{nest::kubernetes::service}-puppetserver,%{lookup('puppet_server_alt_names')}"

          if [ ! -f "/etc/puppetlabs/puppet/ssl/certs/${certname}.pem" ]; then
            puppetserver ca generate \
              --ca-client \
              --force \
              --certname "${certname}" \
              --subject-alt-names "${alt_names}"
          fi

          puppet config set --section server certname "${certname}"
          puppet config set --section server dns_alt_names "${alt_names}"

        10-set-main-environment.sh: |-
          #!/bin/sh
          puppet config set --section server environment main
  r10k:
    code:
      cronJob:
        enabled: false
      extraEnv:
        GIT_SSH_COMMAND: >-
          ssh -o HostName=ssh.gitlab.eyrie.
          -o HostKeyAlias=gitlab.joyfullee.me
          -o IdentityFile=/home/puppet/.ssh/id_rsa
          -o UserKnownHostsFile=/home/puppet/.ssh/known_hosts
      viaSsh:
        credentials:
          existingSecret: "%{nest::kubernetes::main_service}-r10k-code-creds"
  puppetdb:
    tag: 8-latest
    customconfigs:
      enabled: true
      configmaps:
        auth.conf: |-
          authorization: {
              version: 1
              rules: [
                  {
                      match-request: {
                          path: "/status/v1/services"
                          type: path
                          method: get
                      }
                      allow-unauthenticated: true
                      sort-order: 500
                      name: "puppetlabs status service - full"
                  },
                  {
                      match-request: {
                          path: "/status/v1/simple"
                          type: path
                          method: get
                      }
                      allow-unauthenticated: true
                      sort-order: 500
                      name: "puppetlabs status service - simple"
                  },
                  {
                      match-request: {
                          path: "/pdb/query"
                          type: path
                      }
                      allow: ["%{lookup('puppetboard_certname')}"]
                      sort-order: 500
                      name: "puppetboard PuppetDB queries"
                  },
                  {
                      match-request: {
                          path: "/metrics"
                          type: path
                          method: [get, post]
                      }
                      allow: "*"
                      sort-order: 500
                      name: "puppetlabs puppetdb metrics"
                  },
                  {
                      match-request: {
                          path: "/"
                          type: path
                      }
                      deny: "*"
                      sort-order: 999
                      name: "puppetlabs deny all"
                  }
              ]
          }
    extraInitContainers:
      - name: create-puppetdb-log-dir
        image: docker.io/library/busybox:1.37
        command:
          - sh
          - -c
          - |
            mkdir -p /opt/puppetlabs/server/data/puppetdb/logs
            chown 999:999 /opt/puppetlabs/server/data/puppetdb/logs
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop:
              - all
            add:
              - CHOWN
              - DAC_OVERRIDE
              - FOWNER
        volumeMounts:
          - name: puppetdb-storage
            mountPath: /opt/puppetlabs/server/data/puppetdb
    extraEnv:
      OPENVOXDB_POSTGRES_HOSTNAME: "%{nest::kubernetes::main_service}-cnpg-rw"
      PUPPETDB_NODE_TTL: '0d'
    persistence:
      storageClass: "%{lookup('storage_class')}"
      accessModes: [ReadWriteOnce]
      size: 4Gi
  postgresql:
    enabled: false
  puppetboard:
    enabled: false

patches:
  03-rename-puppetdb-service:
    patch:
      - op: replace
        path: /metadata/name
        value: "%{nest::kubernetes::service}-puppetdb"
    target:
      version: v1
      kind: Service
      name: "%{nest::kubernetes::service}-puppetserver-puppetdb"

  04-rename-puppetserver-service:
    patch:
      - op: replace
        path: /metadata/name
        value: "%{nest::kubernetes::service}-puppetserver"
    target:
      version: v1
      kind: Service
      name: "%{nest::kubernetes::service}-puppetserver-puppet"

  05-rename-puppetdb-deployment:
    patch:
      - op: replace
        path: /metadata/name
        value: "%{nest::kubernetes::service}-puppetdb"
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver-puppetdb"

  06-rename-puppetserver-deployment:
    patch:
      - op: replace
        path: /metadata/name
        value: "%{nest::kubernetes::service}-puppetserver"
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver-puppetserver-master"

  07-use-clean-puppetdb-service-name:
    patch:
      - op: replace
        path: /spec/template/spec/initContainers/1/command/2
        value: |
          echo 'Waiting for puppetserver to become ready...'
          until printf "." && curl --silent --fail --insecure 'https://%{nest::kubernetes::service}-puppetserver:8140/status/v1/simple' | grep -q '^running$'; do
            sleep 2;
          done;
          echo 'Puppetserver OK ✓'
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "%{nest::kubernetes::service}-puppetserver"
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "openvoxdb,puppetdb,%{nest::kubernetes::service}-puppetdb"
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetdb"

  08-use-clean-puppetserver-service-name:
    patch:
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "puppet,%{nest::kubernetes::service}-puppetserver,%{lookup('puppet_server_alt_names')}"
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "https://%{nest::kubernetes::service}-puppetdb:8081"
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver"

  09-mount-eyaml-keys:
    patch:
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: eyaml-host-config
          hostPath:
            path: /etc/eyaml
            type: Directory
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: eyaml-config
          emptyDir: {}
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: eyaml-config
          image: registry.eyrie/nest/stage1/server
          command:
            - /bin/sh
            - -ec
            - >-
              cp -a /host-eyaml/. /etc/eyaml/;
              chown -R 999:999 /etc/eyaml;
              chmod 0755 /etc/eyaml /etc/eyaml/keys;
              chmod 0644 /etc/eyaml/config.yaml /etc/eyaml/keys/public_key.pkcs7.pem;
              chmod 0400 /etc/eyaml/keys/private_key.pkcs7.pem
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: eyaml-host-config
              mountPath: /host-eyaml
              readOnly: true
            - name: eyaml-config
              mountPath: /etc/eyaml
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: eyaml-config
          mountPath: /etc/eyaml
          readOnly: true
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver"

  10-bootstrap-puppet-code:
    patch:
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: r10k-code-bootstrap
          image: ghcr.io/voxpupuli/r10k:5.0.0-main
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - >-
              /container-entrypoint.sh deploy environment
              --config /etc/puppetlabs/puppet/r10k_code.yaml
              --puppetfile
          env:
            - name: GIT_SSH_COMMAND
              value: >-
                ssh -o HostName=ssh.gitlab.eyrie.
                -o HostKeyAlias=gitlab.joyfullee.me
                -o IdentityFile=/home/puppet/.ssh/id_rsa
                -o UserKnownHostsFile=/home/puppet/.ssh/known_hosts
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: r10k-code-ssh
              mountPath: /home/puppet/.ssh
            - name: puppet-code-storage
              mountPath: /etc/puppetlabs/code/
            - name: puppet-puppet-storage
              mountPath: /etc/puppetlabs/puppet/
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver"
