---
include:
  - 'nest::service::puppet'

service_name: "%{nest::kubernetes::service}"
cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
ingress_class: contour
puppet_load_balancer_ip: '172.21.3.0'
node_role: compute
storage_class: owl-crypt
puppet_server_alt_names: puppet.eyrie,puppet-test.eyrie
puppetboard_certname: "%{nest::kubernetes::service}-puppetboard.%{nest::kubernetes::namespace}.svc"

resources:
  registry_auths: {}
  backup: {}
  restore: {}

  puppetboard-certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-puppetboard-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{nest::kubernetes::fqdn}"

  puppetboard-deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard"
      namespace: "%{nest::kubernetes::namespace}"
      labels: &puppetboard_labels
        app.kubernetes.io/name: puppetboard
        app.kubernetes.io/instance: "%{nest::kubernetes::service}"
        app.kubernetes.io/component: puppetboard
    spec:
      replicas: 1
      selector:
        matchLabels: *puppetboard_labels
      template:
        metadata:
          labels: *puppetboard_labels
        spec:
          nodeSelector:
            "node-role.kubernetes.io/%{lookup('node_role')}": ''
          tolerations:
            - key: "node-role.kubernetes.io/%{lookup('node_role')}"
              operator: Exists
              effect: NoSchedule
          containers:
            - name: puppetboard
              image: ghcr.io/voxpupuli/puppetboard:7.0.2
              imagePullPolicy: IfNotPresent
              env:
                - name: PUPPETDB_HOST
                  value: "%{nest::kubernetes::service}-puppetserver-puppetdb"
                - name: PUPPETDB_PORT
                  value: '8081'
                - name: PUPPETDB_PROTO
                  value: https
                - name: PUPPETDB_SSL_VERIFY
                  value: /etc/puppetboard/puppetdb/ca.pem
                - name: PUPPETDB_CERT
                  value: /etc/puppetboard/puppetdb/cert.pem
                - name: PUPPETDB_KEY
                  value: /etc/puppetboard/puppetdb/key.pem
                - name: PUPPETBOARD_PORT
                  value: '9090'
                - name: DEFAULT_ENVIRONMENT
                  value: main
                - name: ENABLE_CATALOG
                  value: 'True'
                - name: UNRESPONSIVE_HOURS
                  value: '8760'
              envFrom:
                - secretRef:
                    name: "%{nest::kubernetes::main_service}-puppetboard-secrets"
              ports:
                - name: puppetboard
                  containerPort: 9090
              volumeMounts:
                - name: puppetdb-client-certs
                  mountPath: /etc/puppetboard/puppetdb
                  readOnly: true
              readinessProbe:
                httpGet:
                  path: /
                  port: puppetboard
                initialDelaySeconds: 5
                periodSeconds: 10
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - all
                runAsGroup: 999
                runAsNonRoot: true
                runAsUser: 999
          volumes:
            - name: puppetdb-client-certs
              secret:
                secretName: "%{nest::kubernetes::service}-puppetboard-puppetdb-client"

  puppetboard-service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ports:
        - name: puppetboard
          port: 9090
          targetPort: puppetboard
      selector: *puppetboard_labels

  puppetboard-ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}-puppetboard"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      rules:
        - host: "%{nest::kubernetes::fqdn}"
          http:
            paths:
              - path: /
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: "%{nest::kubernetes::service}-puppetboard"
                    port:
                      number: 9090
      tls:
        - secretName: "%{nest::kubernetes::service}-puppetboard-certs"
          hosts:
            - "%{nest::kubernetes::fqdn}"

values:
  nodeSelector:
    "node-role.kubernetes.io/%{lookup('node_role')}": ''
  tolerations:
    - key: "node-role.kubernetes.io/%{lookup('node_role')}"
      operator: Exists
      effect: NoSchedule
  global:
    curl:
      image: docker.io/curlimages/curl
    extraEnv:
      PUPPETSERVER_ENVIRONMENT_TIMEOUT: '0'
    postgresql:
      auth:
        database: openvoxdb
        existingSecret: "%{nest::kubernetes::main_service}-cnpg-app"
  storage:
    storageClass: "%{lookup('storage_class')}"
  puppetserver:
    tag: 8-latest
    puppeturl: 'git@gitlab.joyfullee.me:nest/config.git'
    puppetbasedir: /etc/puppetlabs/code/environments
    persistence:
      ca:
        storageClass: "%{lookup('storage_class')}"
        accessModes: [ReadWriteOnce]
        size: 1Gi
      code:
        storageClass: "%{lookup('storage_class')}"
        accessModes: [ReadWriteMany]
        size: 4Gi
      data:
        storageClass: "%{lookup('storage_class')}"
        accessModes: [ReadWriteOnce]
        size: 1Gi
    masters:
      fqdns:
        alternateServerNames: "%{alias('puppet_server_alt_names')}"
      service:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/allow-shared-ip: "%{lookup('puppet_load_balancer_ip')}"
        loadBalancerIP: "%{lookup('puppet_load_balancer_ip')}"
      ingress:
        enabled: false
      extraEnv:
        OPENVOXSERVER_HOSTNAME: "%{nest::kubernetes::fqdn}"
    customentrypoints:
      enabled: true
      configmaps:
        10-set-main-environment.sh: |-
          #!/bin/sh
          puppet config set --section server environment main
  r10k:
    code:
      cronJob:
        enabled: false
      extraEnv:
        GIT_SSH_COMMAND: >-
          ssh -o HostName=ssh.gitlab.eyrie.
          -o HostKeyAlias=gitlab.joyfullee.me
          -o IdentityFile=/home/puppet/.ssh/id_rsa
          -o UserKnownHostsFile=/home/puppet/.ssh/known_hosts
      viaSsh:
        credentials:
          existingSecret: "%{nest::kubernetes::main_service}-r10k-code-creds"
  puppetdb:
    tag: 8-latest
    customconfigs:
      enabled: true
      configmaps:
        auth.conf: |-
          authorization: {
              version: 1
              rules: [
                  {
                      match-request: {
                          path: "/status/v1/services"
                          type: path
                          method: get
                      }
                      allow-unauthenticated: true
                      sort-order: 500
                      name: "puppetlabs status service - full"
                  },
                  {
                      match-request: {
                          path: "/status/v1/simple"
                          type: path
                          method: get
                      }
                      allow-unauthenticated: true
                      sort-order: 500
                      name: "puppetlabs status service - simple"
                  },
                  {
                      match-request: {
                          path: "/pdb/query"
                          type: path
                      }
                      allow: ["%{lookup('puppetboard_certname')}"]
                      sort-order: 500
                      name: "puppetboard PuppetDB queries"
                  },
                  {
                      match-request: {
                          path: "/metrics"
                          type: path
                          method: [get, post]
                      }
                      allow: "*"
                      sort-order: 500
                      name: "puppetlabs puppetdb metrics"
                  },
                  {
                      match-request: {
                          path: "/"
                          type: path
                      }
                      deny: "*"
                      sort-order: 999
                      name: "puppetlabs deny all"
                  }
              ]
          }
    extraInitContainers:
      - name: create-puppetdb-log-dir
        image: docker.io/library/busybox:1.37
        command:
          - sh
          - -c
          - |
            mkdir -p /opt/puppetlabs/server/data/puppetdb/logs
            chown 999:999 /opt/puppetlabs/server/data/puppetdb/logs
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            drop:
              - all
            add:
              - CHOWN
              - DAC_OVERRIDE
              - FOWNER
        volumeMounts:
          - name: puppetdb-storage
            mountPath: /opt/puppetlabs/server/data/puppetdb
    extraEnv:
      OPENVOXDB_POSTGRES_HOSTNAME: "%{nest::kubernetes::main_service}-cnpg-rw"
      PUPPETDB_NODE_TTL: '0d'
    persistence:
      storageClass: "%{lookup('storage_class')}"
      accessModes: [ReadWriteOnce]
      size: 4Gi
  postgresql:
    enabled: false
  puppetboard:
    enabled: false

patches:
  05-rename-puppetdb-deployment:
    patch:
      - op: replace
        path: /metadata/name
        value: "%{nest::kubernetes::service}-puppetdb"
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver-puppetdb"

  06-rename-puppetserver-deployment:
    patch:
      - op: replace
        path: /metadata/name
        value: "%{nest::kubernetes::service}-puppetserver"
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver-puppetserver-master"

  10-bootstrap-puppet-code:
    patch:
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: r10k-code-bootstrap
          image: ghcr.io/voxpupuli/r10k:5.0.0-main
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - >-
              /container-entrypoint.sh deploy environment
              --config /etc/puppetlabs/puppet/r10k_code.yaml
              --puppetfile
          env:
            - name: GIT_SSH_COMMAND
              value: >-
                ssh -o HostName=ssh.gitlab.eyrie.
                -o HostKeyAlias=gitlab.joyfullee.me
                -o IdentityFile=/home/puppet/.ssh/id_rsa
                -o UserKnownHostsFile=/home/puppet/.ssh/known_hosts
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: r10k-code-ssh
              mountPath: /home/puppet/.ssh
            - name: puppet-code-storage
              mountPath: /etc/puppetlabs/code/
            - name: puppet-puppet-storage
              mountPath: /etc/puppetlabs/puppet/
    target:
      group: apps
      version: v1
      kind: Deployment
      name: "%{nest::kubernetes::service}-puppetserver"
