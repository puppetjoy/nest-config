---
# ROCm-backed local speech API for owl / Strix Halo.
# The image is AMD's ROCm 7.2.4 PyTorch base; the startup installs the small
# Python speech server dependencies until this bootstrap is baked into a Nest
# tool image. Versions are pinned from the proven ROCm 7.2.4 live pod so
# restarts do not silently pick up a different TTS/STT stack. Persistent cache
# keeps model, MIOpen, and pip artifacts across restarts.
cache_size: 80Gi
storage_class: owl-crypt
image: docker.io/rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.9.1
app_version: '0.3.2'
roundtrip_monitor_schedule: '17 * * * *'
roundtrip_monitor_image: "%{lookup('config_registry')}/nest/stage1/server"
roundtrip_monitor_expected_words: 'Joy,Talon,Star,voice,speech,request,recorded'
roundtrip_monitor_max_rtf: '1.0'
roundtrip_monitor_max_restarts: '0'

resources:
  backup: {}
  restore: {}
  registry_auths: {}

  roundtrip-monitor-service-account:
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: "%{nest::kubernetes::service}-roundtrip-monitor"
      namespace: "%{nest::kubernetes::namespace}"

  roundtrip-monitor-role:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: "%{nest::kubernetes::service}-roundtrip-monitor"
      namespace: "%{nest::kubernetes::namespace}"
    rules:
      - apiGroups: ['']
        resources: ['pods']
        verbs: ['get', 'list']

  roundtrip-monitor-role-binding:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: "%{nest::kubernetes::service}-roundtrip-monitor"
      namespace: "%{nest::kubernetes::namespace}"
    subjects:
      - kind: ServiceAccount
        name: "%{nest::kubernetes::service}-roundtrip-monitor"
        namespace: "%{nest::kubernetes::namespace}"
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: "%{nest::kubernetes::service}-roundtrip-monitor"

  roundtrip-monitor-script:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-roundtrip-monitor"
      namespace: "%{nest::kubernetes::namespace}"
    data:
      monitor.py: |
        import contextlib
        import json
        import os
        import ssl
        import struct
        import sys
        import tempfile
        import time
        import urllib.error
        import urllib.parse
        import urllib.request
        import uuid
        import wave

        ENDPOINT = os.environ.get('VOICE_SPEECH_ENDPOINT', 'http://voice-speech').rstrip('/')
        EXPECTED_VERSION = os.environ.get('EXPECTED_VERSION', '')
        EXPECTED_VOICES = [v for v in os.environ.get('EXPECTED_VOICES', 'af_alloy,af_nova').split(',') if v]
        EXPECTED_WORDS = [w.lower() for w in os.environ.get('EXPECTED_WORDS', '').split(',') if w]
        MAX_RTF = float(os.environ.get('MAX_RTF', '1.0'))
        MAX_RESTARTS = int(os.environ.get('MAX_RESTARTS', '0'))
        PROMPT = os.environ.get(
            'ROUNDTRIP_PROMPT',
            'Joy—voice speech monitor. Talon and Star use voice-speech. Request recorded and task recorded.',
        )
        STT_MODEL = os.environ.get('STT_MODEL', 'whisper-large-v3-turbo')
        STT_PROMPT = os.environ.get('STT_PROMPT', 'Talon Star Eyrie KubeCM voice-speech Kokoro')

        def fail(message, **details):
            print(json.dumps({'ok': False, 'error': message, **details}, sort_keys=True), file=sys.stderr)
            raise SystemExit(1)

        def get_json(path):
            with urllib.request.urlopen(f'{ENDPOINT}{path}', timeout=30) as response:
                return json.loads(response.read().decode('utf-8'))

        def post_json_audio(path, payload):
            request = urllib.request.Request(
                f'{ENDPOINT}{path}',
                data=json.dumps(payload).encode('utf-8'),
                headers={'Content-Type': 'application/json', 'Accept': 'audio/wav'},
                method='POST',
            )
            start = time.monotonic()
            with urllib.request.urlopen(request, timeout=120) as response:
                body = response.read()
                headers = {key.lower(): value for key, value in response.headers.items()}
            return body, headers, time.monotonic() - start

        def post_multipart_transcription(audio):
            boundary = '----nest-voice-speech-' + uuid.uuid4().hex
            fields = {
                'model': STT_MODEL,
                'language': 'en',
                'temperature': '0',
                'condition_on_previous_text': 'false',
                'initial_prompt': STT_PROMPT,
            }
            parts = []
            for key, value in fields.items():
                parts.append(f'--{boundary}\r\nContent-Disposition: form-data; name="{key}"\r\n\r\n{value}\r\n'.encode())
            parts.append(
                f'--{boundary}\r\nContent-Disposition: form-data; name="file"; filename="roundtrip.wav"\r\nContent-Type: audio/wav\r\n\r\n'.encode()
                + audio
                + b'\r\n'
            )
            parts.append(f'--{boundary}--\r\n'.encode())
            request = urllib.request.Request(
                f'{ENDPOINT}/v1/audio/transcriptions',
                data=b''.join(parts),
                headers={'Content-Type': f'multipart/form-data; boundary={boundary}'},
                method='POST',
            )
            with urllib.request.urlopen(request, timeout=180) as response:
                return json.loads(response.read().decode('utf-8'))

        def wav_stats(audio):
            with tempfile.NamedTemporaryFile(suffix='.wav') as tmp:
                tmp.write(audio)
                tmp.flush()
                with contextlib.closing(wave.open(tmp.name, 'rb')) as wav:
                    frames = wav.readframes(wav.getnframes())
                    duration = wav.getnframes() / float(wav.getframerate()) if wav.getframerate() else 0.0
                    if frames and wav.getsampwidth() == 2:
                        count = len(frames) // 2
                        samples = struct.unpack('<' + 'h' * count, frames)
                        rms = int((sum(sample * sample for sample in samples) / count) ** 0.5) if count else 0
                    elif frames:
                        rms = 1
                    else:
                        rms = 0
                    return {
                        'channels': wav.getnchannels(),
                        'sample_rate': wav.getframerate(),
                        'sample_width': wav.getsampwidth(),
                        'frames': wav.getnframes(),
                        'duration': round(duration, 3),
                        'rms': rms,
                    }

        def pod_restarts():
            token_path = '/var/run/secrets/kubernetes.io/serviceaccount/token'
            ca_path = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
            namespace_path = '/var/run/secrets/kubernetes.io/serviceaccount/namespace'
            if not os.path.exists(token_path):
                return None
            namespace = open(namespace_path, encoding='utf-8').read().strip()
            token = open(token_path, encoding='utf-8').read().strip()
            host = os.environ.get('KUBERNETES_SERVICE_HOST')
            port = os.environ.get('KUBERNETES_SERVICE_PORT', '443')
            if not host:
                return None
            url = f'https://{host}:{port}/api/v1/namespaces/{namespace}/pods?labelSelector=app%3Dvoice-speech'
            request = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
            context = ssl.create_default_context(cafile=ca_path)
            with urllib.request.urlopen(request, timeout=30, context=context) as response:
                pods = json.loads(response.read().decode('utf-8')).get('items', [])
            return {
                pod['metadata']['name']: sum(cs.get('restartCount', 0) for cs in pod.get('status', {}).get('containerStatuses', []))
                for pod in pods
            }

        def main():
            health = get_json('/health')
            if not health.get('ok'):
                fail('health not ok', health=health)
            if EXPECTED_VERSION and health.get('version') != EXPECTED_VERSION:
                fail('source/live version drift', expected_version=EXPECTED_VERSION, live_version=health.get('version'))

            voices = get_json('/v1/audio/voices')
            available = set(voices.get('recommended', [])) | set(voices.get('cached', []))
            missing_voices = sorted(set(EXPECTED_VOICES) - available)
            if missing_voices:
                fail('expected voices missing', missing_voices=missing_voices, voices=voices)

            audio, headers, wall = post_json_audio('/v1/audio/speech', {
                'input': PROMPT,
                'model': 'kokoro',
                'voice': EXPECTED_VOICES[0] if EXPECTED_VOICES else 'af_alloy',
                'response_format': 'wav',
                'speed': 1.0,
                'normalize': True,
            })
            if not audio:
                fail('tts returned empty audio')
            stats = wav_stats(audio)
            if stats['duration'] <= 1.0 or stats['rms'] <= 1:
                fail('tts audio is too short or silent', audio_stats=stats)
            rtf = float(headers.get('x-nest-tts-rtf', '0') or 0)
            if rtf > MAX_RTF:
                fail('tts rtf too high', rtf=rtf, max_rtf=MAX_RTF, audio_stats=stats)

            transcript = post_multipart_transcription(audio).get('text', '')
            lower = transcript.lower()
            missing_words = [word for word in EXPECTED_WORDS if word not in lower]
            if missing_words:
                fail('stt transcript missing expected words', missing_words=missing_words, transcript=transcript)

            restarts = pod_restarts()
            if restarts is not None:
                bad = {name: count for name, count in restarts.items() if count > MAX_RESTARTS}
                if bad:
                    fail('voice-speech pod restarts exceeded threshold', restarts=restarts, max_restarts=MAX_RESTARTS)

            print(json.dumps({
                'ok': True,
                'health_version': health.get('version'),
                'voices_checked': EXPECTED_VOICES,
                'tts_wall_seconds': round(wall, 3),
                'tts_rtf': rtf,
                'audio': stats,
                'transcript': transcript,
                'pod_restarts': restarts,
            }, sort_keys=True))

        if __name__ == '__main__':
            try:
                main()
            except urllib.error.HTTPError as exc:
                fail('http error', status=exc.code, body=exc.read().decode('utf-8', 'replace'))
            except Exception as exc:
                fail(type(exc).__name__, detail=str(exc))

  roundtrip-monitor:
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: "%{nest::kubernetes::service}-roundtrip-monitor"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{nest::kubernetes::service}"
        component: roundtrip-monitor
    spec:
      concurrencyPolicy: Forbid
      schedule: "%{lookup('roundtrip_monitor_schedule')}"
      timeZone: 'America/New_York'
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          ttlSecondsAfterFinished: 86400
          template:
            metadata:
              labels:
                app: "%{nest::kubernetes::service}"
                component: roundtrip-monitor
            spec:
              restartPolicy: Never
              serviceAccountName: "%{nest::kubernetes::service}-roundtrip-monitor"
              containers:
                - name: monitor
                  image: "%{lookup('roundtrip_monitor_image')}"
                  imagePullPolicy: IfNotPresent
                  command: ['python3', '/monitor/monitor.py']
                  env:
                    - name: VOICE_SPEECH_ENDPOINT
                      value: "http://%{nest::kubernetes::service}"
                    - name: EXPECTED_VERSION
                      value: "%{lookup('app_version')}"
                    - name: EXPECTED_VOICES
                      value: 'af_alloy,af_nova'
                    - name: EXPECTED_WORDS
                      value: "%{lookup('roundtrip_monitor_expected_words')}"
                    - name: MAX_RTF
                      value: "%{lookup('roundtrip_monitor_max_rtf')}"
                    - name: MAX_RESTARTS
                      value: "%{lookup('roundtrip_monitor_max_restarts')}"
                    - name: STT_MODEL
                      value: 'whisper-large-v3-turbo'
                    - name: STT_PROMPT
                      value: 'Talon Star Honcho Eyrie KubeCM llama-qwen GitLab Puppet Kubernetes OpenVox ROCm kubectl owl voice-speech Kokoro'
                  volumeMounts:
                    - name: monitor
                      mountPath: /monitor
                      readOnly: true
              volumes:
                - name: monitor
                  configMap:
                    name: "%{nest::kubernetes::service}-roundtrip-monitor"

  cache:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-cache"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('cache_size')}"
      storageClassName: "%{lookup('storage_class')}"

  app:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-app"
      namespace: "%{nest::kubernetes::namespace}"
    data:
      server.py: |
        import glob
        import importlib.metadata
        import io
        import os
        import re
        import threading
        import time

        import numpy as np
        import soundfile as sf
        import torch
        import whisper
        from fastapi import FastAPI, File, Form, HTTPException, UploadFile
        from fastapi.responses import Response
        from kokoro import KPipeline
        from pydantic import BaseModel

        try:
            from scipy.signal import resample_poly
        except Exception:  # pragma: no cover - startup health reports this
            resample_poly = None

        app = FastAPI(title='Nest voice-speech', version='%{lookup("app_version")}')
        device = 'cuda' if torch.cuda.is_available() else 'cpu'
        lock = threading.Lock()
        tts_pipelines = {}
        stt_models = {}
        STT_MODELS = [
            'tiny',
            'base',
            'small',
            'medium',
            'large-v3-turbo',
            'large-v3',
        ]

        VOICE_LANG_CODES = {
            'af': 'a', 'am': 'a',
            'bf': 'b', 'bm': 'b',
            'ef': 'e', 'em': 'e',
            'ff': 'f',
            'hf': 'h', 'hm': 'h',
            'if': 'i', 'im': 'i',
            'jf': 'j', 'jm': 'j',
            'pf': 'p', 'pm': 'p',
            'zf': 'z', 'zm': 'z',
        }
        RECOMMENDED_VOICES = ['af_heart', 'af_nova', 'af_alloy']
        PRONUNCIATIONS = [
            (re.compile(r'\bKubeCM\b'), 'cube see em'),
            (re.compile(r'\bkubectl\b'), 'cube control'),
            (re.compile(r'\bllama-qwen\b', re.IGNORECASE), 'llama qwen'),
            (re.compile(r'\bEyrie\b'), 'airy'),
            (re.compile(r'\bOpenVox\b'), 'open vox'),
            (re.compile(r'\bROCm\b'), 'rock em'),
            (re.compile(r'\bStrix Halo\b'), 'Strix halo'),
        ]

        class SpeechRequest(BaseModel):
            input: str
            model: str = 'kokoro'
            voice: str = 'af_heart'
            response_format: str = 'wav'
            speed: float = 1.0
            normalize: bool = True

        def normalize_url(scheme: str, value: str):
            suffix = ''
            while value and value[-1] in '.!?':
                suffix = value[-1] + suffix
                value = value[:-1]
            return 'link' + suffix

        def normalize_path(match):
            value = match.group(0)
            suffix = ''
            while value and value[-1] in '.,;:':
                suffix = value[-1] + suffix
                value = value[:-1]
            parts = [part for part in value.split('/') if part and part != '~']
            if not parts:
                return 'path recorded' + suffix
            return 'path ' + ' '.join(parts[:3]) + (' and more' if len(parts) > 3 else '') + suffix

        def smooth_recorded_phrases(text: str):
            text = re.sub(r'\b(?:request\s+recorded\s*){2,}', 'request recorded', text, flags=re.IGNORECASE)
            text = re.sub(r'\b(?:task\s+recorded\s*){2,}', 'task recorded', text, flags=re.IGNORECASE)
            text = re.sub(r'\brecorded\s+recorded\b', 'recorded', text, flags=re.IGNORECASE)
            return text

        def normalize_for_tts(text: str):
            exact_match = re.match(r'^\s*(?:exact|verbatim)\s*:\s*(.+)\s*$', text, flags=re.IGNORECASE | re.DOTALL)
            if exact_match:
                return re.sub(r'\s+', ' ', exact_match.group(1)).strip()

            normalized = text
            normalized = re.sub(r'https://([^\s,;]+)', lambda m: normalize_url('H T T P S', m.group(1)), normalized)
            normalized = re.sub(r'http://([^\s,;]+)', lambda m: normalize_url('H T T P', m.group(1)), normalized)
            normalized = re.sub(r'\b(?:agent\s+request|request)\s+ar-[0-9]{8}-[0-9]{6}-[0-9a-f]{6,12}\b', 'request recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\bar-[0-9]{8}-[0-9]{6}-[0-9a-f]{6,12}\b', 'request recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\b(?:acceptance\s+ID\s*[:=]?\s*)?rva-[0-9]{8}-[0-9]{6}-[0-9a-f]{6,12}\b', 'review acceptance recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\btask\s+t_[0-9a-f]{8,16}\b', 'task recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\bt_[0-9a-f]{8,16}\b', 'task recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\b(commit|revision|rev)\s*[:=]?\s*[0-9a-f]{7,40}\b', r'\1 recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\b(?:sha(?:-?256)?|checksum|digest|hash)\s*[:=]?\s*[0-9a-f]{32,128}\b', 'checksum recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'\b[0-9a-f]{32,128}\b', 'checksum recorded', normalized, flags=re.IGNORECASE)
            normalized = re.sub(r'(?<!\w)/(?:[A-Za-z0-9._-]+/?)+', normalize_path, normalized)
            for pattern, replacement in PRONUNCIATIONS:
                normalized = pattern.sub(replacement, normalized)
            normalized = smooth_recorded_phrases(normalized)
            normalized = re.sub(r'\s+', ' ', normalized).strip()
            return normalized

        def voice_lang_code(voice: str):
            prefix = voice.split('_', 1)[0]
            return VOICE_LANG_CODES.get(prefix, 'a')

        def get_tts_pipeline(voice: str):
            lang_code = voice_lang_code(voice)
            if lang_code not in tts_pipelines:
                tts_pipelines[lang_code] = KPipeline(lang_code=lang_code)
            return tts_pipelines[lang_code]

        def cached_voices():
            voices = set()
            for path in glob.glob('/cache/huggingface/hub/models--hexgrad--Kokoro-82M/snapshots/*/voices/*.pt'):
                voices.add(os.path.splitext(os.path.basename(path))[0])
            return sorted(voices)

        def cached_stt_models():
            models = set()
            for path in glob.glob('/cache/whisper/*.pt'):
                models.add(os.path.splitext(os.path.basename(path))[0])
            return sorted(models)

        def normalize_stt_model(name: str):
            return name.removeprefix('whisper-')

        def get_stt_model(name: str):
            model_name = normalize_stt_model(name)
            if model_name not in STT_MODELS:
                raise HTTPException(status_code=400, detail=f'Unsupported STT model: {name}')
            if model_name not in stt_models:
                stt_models[model_name] = whisper.load_model(model_name, device=device)
            return stt_models[model_name]

        @app.get('/health')
        def health():
            return {
                'ok': True,
                'version': app.version,
                'torch': torch.__version__,
                'kokoro': importlib.metadata.version('kokoro'),
                'cuda_available': torch.cuda.is_available(),
                'device': torch.cuda.get_device_name(0) if torch.cuda.is_available() else None,
                'miopen_find_mode': os.environ.get('MIOPEN_FIND_MODE'),
                'loaded_tts_langs': sorted(tts_pipelines.keys()),
                'loaded_stt_models': sorted(stt_models.keys()),
                'cached_voices': cached_voices(),
                'cached_stt_models': cached_stt_models(),
            }

        @app.get('/v1/audio/voices')
        def voices():
            return {
                'default': 'af_heart',
                'recommended': RECOMMENDED_VOICES,
                'cached': cached_voices(),
                'language_prefixes': VOICE_LANG_CODES,
            }

        @app.get('/v1/models')
        def models():
            return {
                'data': [
                    {'id': 'kokoro', 'object': 'model', 'owned_by': 'nest'},
                    *[{'id': f'whisper-{name}', 'object': 'model', 'owned_by': 'nest'} for name in STT_MODELS],
                ]
            }

        @app.get('/v1/audio/normalize')
        def normalize(text: str):
            return {'input': text, 'normalized': normalize_for_tts(text)}

        @app.post('/v1/audio/speech')
        def speech(request: SpeechRequest):
            if request.response_format != 'wav':
                raise HTTPException(status_code=400, detail='Only wav response_format is currently supported')
            if request.model != 'kokoro':
                raise HTTPException(status_code=400, detail='Only kokoro model is currently supported')
            input_text = normalize_for_tts(request.input) if request.normalize else request.input
            t0 = time.perf_counter()
            with lock:
                pipeline = get_tts_pipeline(request.voice)
                chunks = []
                for item in pipeline(input_text, voice=request.voice, speed=request.speed):
                    audio = getattr(item, 'audio', item[-1] if isinstance(item, tuple) else item)
                    chunks.append(audio)
            if not chunks:
                raise HTTPException(status_code=500, detail='TTS produced no audio')
            arrays = [chunk.detach().cpu().numpy() if hasattr(chunk, 'detach') else np.asarray(chunk) for chunk in chunks]
            audio = np.concatenate(arrays)
            out = io.BytesIO()
            sf.write(out, audio, 24000, format='WAV')
            duration = len(audio) / 24000
            elapsed = time.perf_counter() - t0
            headers = {
                'X-Nest-TTS-Voice': request.voice,
                'X-Nest-TTS-Lang': voice_lang_code(request.voice),
                'X-Nest-TTS-Normalized': str(request.normalize).lower(),
                'X-Nest-TTS-Seconds': f'{duration:.3f}',
                'X-Nest-TTS-Wall-Seconds': f'{elapsed:.3f}',
                'X-Nest-TTS-RTF': f'{elapsed / duration:.3f}' if duration else '0',
            }
            return Response(content=out.getvalue(), media_type='audio/wav', headers=headers)

        @app.post('/v1/audio/transcriptions')
        async def transcriptions(
            file: UploadFile = File(...),
            model: str = Form('tiny'),
            language: str = Form('en'),
            temperature: float = Form(0.0),
            condition_on_previous_text: bool = Form(False),
            initial_prompt: str | None = Form(None),
        ):
            data = await file.read()
            try:
                audio, sample_rate = sf.read(io.BytesIO(data), dtype='float32')
            except Exception as exc:
                raise HTTPException(status_code=400, detail=f'Could not read audio with libsndfile: {exc}') from exc
            if audio.ndim > 1:
                audio = audio.mean(axis=1)
            if sample_rate != 16000:
                if resample_poly is None:
                    raise HTTPException(status_code=500, detail='scipy is unavailable for audio resampling')
                from math import gcd
                divisor = gcd(sample_rate, 16000)
                audio = resample_poly(audio, 16000 // divisor, sample_rate // divisor).astype(np.float32)
            with lock:
                stt = get_stt_model(model)
                options = {
                    'language': language,
                    'temperature': temperature,
                    'condition_on_previous_text': condition_on_previous_text,
                    'fp16': torch.cuda.is_available(),
                }
                if initial_prompt:
                    options['initial_prompt'] = initial_prompt
                result = stt.transcribe(audio, **options)
            return {'text': result.get('text', '').strip()}

        if __name__ == '__main__':
            import uvicorn
            uvicorn.run(app, host='0.0.0.0', port=8080)

  deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
        spec:
          nodeSelector:
            kubernetes.io/hostname: owl
          tolerations: "%{alias('tolerations')}"
          containers:
            - name: voice-speech
              image: "%{lookup('image')}"
              imagePullPolicy: IfNotPresent
              command: ['/bin/bash', '-lc']
              args:
                - |
                  set -euo pipefail
                  mkdir -p /cache/pip /cache/whisper /cache/huggingface /cache/miopen
                  export PIP_CACHE_DIR=/cache/pip
                  export XDG_CACHE_HOME=/cache
                  export HF_HOME=/cache/huggingface
                  export WHISPER_CACHE_DIR=/cache/whisper
                  export MIOPEN_USER_DB_PATH=/cache/miopen
                  python3 -m pip install --root-user-action=ignore \
                    'kokoro==0.9.4' \
                    'soundfile==0.14.0' \
                    'fastapi==0.136.3' \
                    'uvicorn==0.49.0' \
                    'python-multipart==0.0.32' \
                    'openai-whisper==20250625' \
                    'scipy==1.17.1'
                  exec python3 /app/server.py
              env:
                - name: MIOPEN_FIND_MODE
                  value: '2'
                - name: TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL
                  value: '1'
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: '4'
                  memory: 8Gi
                  squat.ai/gpu: '1'
                limits:
                  cpu: '12'
                  memory: 32Gi
                  squat.ai/gpu: '1'
              volumeMounts:
                - name: app
                  mountPath: /app
                  readOnly: true
                - name: cache
                  mountPath: /cache
              startupProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 10
                failureThreshold: 180
                timeoutSeconds: 2
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 10
                failureThreshold: 3
                timeoutSeconds: 2
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 30
                failureThreshold: 3
                timeoutSeconds: 2
          volumes:
            - name: app
              configMap:
                name: "%{nest::kubernetes::service}-app"
            - name: cache
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-cache"

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
      ports:
        - name: http
          port: 80
          targetPort: 8080
