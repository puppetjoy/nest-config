---
cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
ingress_class: contour-compute
backend_host: owl.nest
backend_ip: 172.22.4.4
backend_port: 9119
plan_base: 'nest::app::hermes'

resources:
  registry_auths: {}

  # Hermes profile backups run on the host-local Hermes service, not inside the
  # Eyrie namespace/service backing the dashboard edge.  Keep this explicit so
  # the shared Kubernetes backup CronJob arguments (namespace=/service=) cannot
  # drift back into nest::app::hermes::backup, which only accepts profile-style
  # parameters.
  backup:
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: "%{nest::kubernetes::service}-backup"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      concurrencyPolicy: Forbid
      schedule: "%{nest::kubernetes::cron_job_offset} %{lookup('backup_hour')} * * *"
      timeZone: 'America/New_York'
      jobTemplate:
        spec:
          ttlSecondsAfterFinished: "%{alias('backup_job_ttl')}"
          template:
            spec:
              containers:
                - name: nest
                  image: "%{lookup('config_registry')}/nest/config/main"
                  imagePullPolicy: Always
                  command:
                    - bolt
                    - plan
                    - run
                    - "%{lookup('plan_base')}::backup"
                    - "service_name=%{nest::kubernetes::service_name}"
                    - "profile=%{nest::kubernetes::service}"
                  env:
                    - name: KUBECONFIG
                      value: '/nest/home/kubeconfigs/eyrie.conf'
                  volumeMounts:
                    - name: nest
                      mountPath: '/nest'
                    - name: bolt-config
                      mountPath: '/etc/puppetlabs/bolt'
                      readOnly: true
                    - name: eyaml-config
                      mountPath: '/etc/eyaml'
                      readOnly: true
                    - name: eyrie-ssh-key
                      mountPath: '/root/.ssh/id_ed25519'
                      readOnly: true
              imagePullSecrets:
                - name: "%{nest::kubernetes::service}-registry-auths"
              restartPolicy: Never
              volumes:
                - name: nest
                  hostPath:
                    path: '/nest'
                    type: Directory
                - name: bolt-config
                  hostPath:
                    path: '/etc/puppetlabs/bolt'
                    type: Directory
                - name: eyaml-config
                  hostPath:
                    path: '/etc/eyaml'
                    type: Directory
                - name: eyrie-ssh-key
                  hostPath:
                    path: '/root/.ssh/id_ed25519_eyrie'
                    type: File

  certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{nest::kubernetes::fqdn}"

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ports:
        - name: http
          port: 80
          protocol: TCP
          targetPort: "%{alias('backend_port')}"

  endpoints:
    apiVersion: v1
    kind: Endpoints
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    subsets:
      - addresses:
          - ip: "%{lookup('backend_ip')}"
        ports:
          - name: http
            port: "%{alias('backend_port')}"
            protocol: TCP

  ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      annotations:
        projectcontour.io/response-timeout: infinity
        projectcontour.io/websocket-routes: /
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      rules:
        - host: "%{nest::kubernetes::fqdn}"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: "%{nest::kubernetes::service}"
                    port:
                      number: 80
      tls:
        - secretName: "%{nest::kubernetes::service}-certs"
          hosts:
            - "%{nest::kubernetes::fqdn}"

values: {}
