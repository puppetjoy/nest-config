---
bucket_storage_class: "ceph-%{nest::kubernetes::namespace}-bucket"
ceph_namespace: "%{nest::kubernetes::namespace}"
ceph_object_store: "ceph-%{nest::kubernetes::namespace}-objectstore"
postgres_storage_class: data-crypt
postgres_storage_size: 16Gi
postgres_image: ghcr.io/cloudnative-pg/postgresql:17.6

resources:
  postgres-cluster:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: "%{nest::kubernetes::main_service}-cnpg"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      instances: 1
      imageName: "%{lookup('postgres_image')}"
      managed:
        roles:
          - name: registry
            ensure: present
            login: true
            passwordSecret:
              name: "%{nest::kubernetes::main_service}-registry-database-password"
      bootstrap:
        initdb:
          database: gitlabhq_production
          owner: gitlab
          postInitApplicationSQL:
            - CREATE EXTENSION IF NOT EXISTS pg_trgm;
            - CREATE EXTENSION IF NOT EXISTS btree_gist;
            - CREATE EXTENSION IF NOT EXISTS plpgsql;
            - CREATE EXTENSION IF NOT EXISTS amcheck;
            - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
      storage:
        storageClass: "%{lookup('postgres_storage_class')}"
        size: "%{lookup('postgres_storage_size')}"
      affinity:
        nodeSelector:
          "node-role.kubernetes.io/%{lookup('node_role')}": ''
        tolerations:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists
            effect: NoSchedule

  registry-database:
    apiVersion: postgresql.cnpg.io/v1
    kind: Database
    metadata:
      name: "%{nest::kubernetes::main_service}-cnpg-registry"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      cluster:
        name: "%{nest::kubernetes::main_service}-cnpg"
      name: registry
      owner: registry
      databaseReclaimPolicy: retain
