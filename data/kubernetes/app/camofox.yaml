---
include:
  - 'nest::service::camofox'

plan_base: 'nest::eyrie::ai::camofox'
service_name: "%{nest::kubernetes::service}"
service_instance: api
cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
ingress_class: contour-compute
node_role: compute
image: registry.gitlab.joyfullee.me/nest/tools/camofox:latest
camofox_port: 9377
camofox_data_dir: /home/node/.camofox
camofox_log_level: info
camofox_telemetry_disabled: '1'
camofox_allow_private_network: 'true'
camofox_ignore_https_errors: 'true'
camofox_auth_mode: disabled
fqdn: camofox.eyrie

.affinity: &affinity
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists

.tolerations: &tolerations
  - key: "node-role.kubernetes.io/%{lookup('node_role')}"
    operator: Exists
    effect: NoSchedule

resources:
  backup: {}
  restore: {}
  registry_auths: {}

  certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{lookup('fqdn')}"

  policy:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "%{nest::kubernetes::service}-policy"
      namespace: "%{nest::kubernetes::namespace}"
    data:
      README.txt: |-
        Camofox service instance: %{lookup('service_instance')}

        This is the singleton Camofox Browser REST API for Hermes standard
        browser tools. It is intentionally agent-first and ephemeral: the pod
        exposes Camofox Browser directly at https://%{lookup('fqdn')}/ and uses
        disposable emptyDir browser state rather than a persistent human desktop
        profile.

        This service is not Joy's persistent secure browser. Operator/login,
        Bitwarden, checkout, and final-purchase flows belong to the separate
        secure-browser/Kasm surface at https://browser.eyrie and stay governed
        by the existing owner-only approval gates.

        Private-network navigation and temporary HTTPS-error ignores are enabled
        only because this trusted internal Nest endpoint must open `.eyrie`
        sites such as Flight Deck. Metadata/link-local egress remains blocked by
        NetworkPolicy; do not reuse this policy for public multi-tenant Camofox.

  metadata-egress-guard:
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: "%{nest::kubernetes::service}-metadata-egress-guard"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      podSelector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      policyTypes:
        - Egress
      egress:
        - to:
            - ipBlock:
                cidr: '0.0.0.0/0'
                except:
                  - '169.254.0.0/16'
        - to:
            - ipBlock:
                cidr: '::/0'
                except:
                  - 'fe80::/10'

  deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{nest::kubernetes::service}"
        camofox.joyfullee.me/app: camofox
        camofox.joyfullee.me/instance: "%{lookup('service_instance')}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            camofox.joyfullee.me/app: camofox
            camofox.joyfullee.me/instance: "%{lookup('service_instance')}"
        spec:
          affinity: *affinity
          tolerations: *tolerations
          securityContext:
            fsGroup: 1000
          containers:
            - name: camofox
              image: "%{lookup('image')}"
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -ec
                - |
                  # The upstream Camofox package refuses private-network targets
                  # with disabled API auth when the server binds beyond loopback.
                  # This singleton is a trusted internal `.eyrie` service,
                  # guarded by Kubernetes NetworkPolicy for metadata/link-local
                  # egress, and Hermes clients do not yet send Camofox bearer
                  # tokens. If the service also opts into HTTPS-error ignores for
                  # the private Eyrie CA, patch the browser context option in the
                  # same tightly-scoped startup shim.
                  if [ "${CAMOFOX_ALLOW_PRIVATE_NETWORK:-false}" = "true" ] && [ "${CAMOFOX_AUTH_MODE:-disabled}" = "disabled" ]; then
                    node <<'JS'
                  const fs = require('node:fs');
                  const candidates = [
                    '/usr/lib64/node_modules/camofox-browser/dist/src/utils/config.js',
                    '/usr/lib64/node_modules/@askjo/camofox-browser/lib/config.js',
                  ];
                  for (const path of candidates) {
                    if (!fs.existsSync(path)) continue;
                    let text = fs.readFileSync(path, 'utf8');
                    const oldGuard = "if (exposesBeyondLoopback && config.authMode === 'disabled' && config.allowPrivateNetworkTargets) {";
                    if (text.includes(oldGuard)) {
                      text = text.replace(oldGuard, 'if (false && exposesBeyondLoopback && config.authMode === \'disabled\' && config.allowPrivateNetworkTargets) {');
                      fs.writeFileSync(path, text);
                      console.warn('[nest] Camofox trusted-internal private-network assertion disabled for this pod');
                      break;
                    }
                  }
                  JS
                  fi
                  if [ "${CAMOFOX_IGNORE_HTTPS_ERRORS:-false}" = "true" ]; then
                    node <<'JS'
                  const fs = require('node:fs');
                  const candidates = [
                    '/usr/lib64/node_modules/camofox-browser/dist/src/services/context-pool.js',
                  ];
                  for (const path of candidates) {
                    if (!fs.existsSync(path)) continue;
                    let text = fs.readFileSync(path, 'utf8');
                    const marker = 'downloadsPath: CONFIG.downloadsDir,';
                    if (text.includes(marker) && !text.includes('ignoreHTTPSErrors: true,')) {
                      text = text.replace(marker, `${marker}\n                ignoreHTTPSErrors: true,`);
                      fs.writeFileSync(path, text);
                      console.warn('[nest] Camofox trusted-internal HTTPS errors ignored for this pod');
                      break;
                    }
                  }
                  JS
                  fi
                  exec /usr/local/bin/nest-camofox-browser
              env:
                - name: CAMOFOX_HOST
                  value: 0.0.0.0
                - name: CAMOFOX_PORT
                  value: "%{lookup('camofox_port')}"
                - name: CAMOFOX_DATA_DIR
                  value: "%{lookup('camofox_data_dir')}"
                - name: CAMOFOX_PROFILES_DIR
                  value: "%{lookup('camofox_data_dir')}/profiles"
                - name: CAMOFOX_COOKIES_DIR
                  value: "%{lookup('camofox_data_dir')}/cookies"
                - name: CAMOFOX_DOWNLOADS_DIR
                  value: "%{lookup('camofox_data_dir')}/downloads"
                - name: CAMOFOX_TRACES_DIR
                  value: "%{lookup('camofox_data_dir')}/traces"
                - name: CAMOFOX_LOG_LEVEL
                  value: "%{lookup('camofox_log_level')}"
                - name: CAMOFOX_TELEMETRY_DISABLED
                  value: "%{lookup('camofox_telemetry_disabled')}"
                - name: CAMOFOX_ALLOW_PRIVATE_NETWORK
                  value: "%{lookup('camofox_allow_private_network')}"
                - name: CAMOFOX_IGNORE_HTTPS_ERRORS
                  value: "%{lookup('camofox_ignore_https_errors')}"
                - name: CAMOFOX_AUTH_MODE
                  value: "%{lookup('camofox_auth_mode')}"
                - name: CAMOFOX_SERVICE_INSTANCE
                  value: "%{lookup('service_instance')}"
                # Kubernetes blocks Firefox's content-process user namespace
                # sandbox in this container; disable the Linux Firefox sandboxes
                # explicitly for the trusted internal automation service.
                - name: MOZ_DISABLE_CONTENT_SANDBOX
                  value: '1'
                - name: MOZ_DISABLE_GMP_SANDBOX
                  value: '1'
                - name: MOZ_DISABLE_RDD_SANDBOX
                  value: '1'
                - name: MOZ_DISABLE_GPU_SANDBOX
                  value: '1'
                - name: MOZ_DISABLE_GFX_SANITY
                  value: '1'
              ports:
                - name: http
                  containerPort: "%{alias('camofox_port')}"
              readinessProbe:
                httpGet:
                  path: /health
                  port: http
                periodSeconds: 5
                timeoutSeconds: 2
                failureThreshold: 12
              livenessProbe:
                httpGet:
                  path: /health
                  port: http
                periodSeconds: 20
                timeoutSeconds: 2
              volumeMounts:
                - name: profile
                  mountPath: /home/node/.camofox
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: profile
              emptyDir: {}
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 1Gi

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
      ports:
        - name: http
          port: 9377
          targetPort: http

  ingress:
    apiVersion: projectcontour.io/v1
    kind: HTTPProxy
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      virtualhost:
        fqdn: "%{lookup('fqdn')}"
        tls:
          secretName: "%{nest::kubernetes::service}-certs"
      routes:
        - conditions:
            - prefix: /
          enableWebsockets: true
          services:
            - name: "%{nest::kubernetes::service}"
              port: 9377
