---
include:
 - 'nest::service::llama_server'

plan_base: 'nest::eyrie::ai::llama'

# Canonical local generative model service.  The 35B-A3B MoE replaces the
# previous resident 122B lane and removes the split-lane topology.  Keep the
# cache PVC large enough for the existing llama-qwen claim during transition;
# stale 122B cache contents can be cleaned after the rollout is accepted.
cache_size: 160Gi
storage_class: owl-crypt
image: registry.gitlab.joyfullee.me/nest/tools/llama.cpp:zen5
model_repo: bartowski/Qwen_Qwen3.5-35B-A3B-GGUF
model_file: Qwen_Qwen3.5-35B-A3B-Q4_K_M.gguf
model_path: /cache/models/Qwen_Qwen3.5-35B-A3B-Q4_K_M.gguf
model_url: https://huggingface.co/bartowski/Qwen_Qwen3.5-35B-A3B-GGUF/resolve/main/Qwen_Qwen3.5-35B-A3B-Q4_K_M.gguf
mmproj_file: mmproj-Qwen_Qwen3.5-35B-A3B-f16.gguf
mmproj_path: /cache/models/mmproj-Qwen_Qwen3.5-35B-A3B-f16.gguf
mmproj_url: https://huggingface.co/bartowski/Qwen_Qwen3.5-35B-A3B-GGUF/resolve/main/mmproj-Qwen_Qwen3.5-35B-A3B-f16.gguf
image_max_tokens: '4096'
ctx_size: '524288'
parallel_requests: '4'
cpu_request: '8'
cpu_limit: '16'
memory_request: 32Gi
memory_limit: 112Gi

resources:
  backup: {}
  restore: {}
  registry_auths: {}

  storage:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-cache"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('cache_size')}"
      storageClassName: "%{lookup('storage_class')}"

  secrets:
    apiVersion: v1
    kind: Secret
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    type: Opaque
    data:
      HF_TOKEN: "%{nest::service::llama_server::hf_token_base64}"

  deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
        spec:
          nodeSelector:
            kubernetes.io/hostname: owl
          tolerations:
            - key: "node-role.kubernetes.io/compute"
              operator: Exists
              effect: NoSchedule
          initContainers:
            - name: fetch-model
              image: docker.io/curlimages/curl:8.11.1
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 0
                runAsGroup: 0
              command:
                - sh
                - -ceu
                - |-
                  mkdir -p "$(dirname "%{lookup('model_path')}")"
                  if [ ! -s "%{lookup('model_path')}" ]; then
                    tmp="%{lookup('model_path')}.tmp"
                    curl -fL --retry 5 --retry-delay 5 --connect-timeout 30 \
                      -o "$tmp" "%{lookup('model_url')}"
                    mv "$tmp" "%{lookup('model_path')}"
                  fi
                  if [ ! -s "%{lookup('mmproj_path')}" ]; then
                    tmp="%{lookup('mmproj_path')}.tmp"
                    curl -fL --retry 5 --retry-delay 5 --connect-timeout 30 \
                      -o "$tmp" "%{lookup('mmproj_url')}"
                    mv "$tmp" "%{lookup('mmproj_path')}"
                  fi
                  ls -lh "%{lookup('model_path')}"
                  ls -lh "%{lookup('mmproj_path')}"
              volumeMounts:
                - name: cache
                  mountPath: /cache
          containers:
            - name: llama-server
              image: "%{lookup('image')}"
              imagePullPolicy: IfNotPresent
              command: ['llama-server', '--host', '0.0.0.0']
              args:
                - --model
                - "%{lookup('model_path')}"
                - --ctx-size
                - "%{lookup('ctx_size')}"
                - --parallel
                - "%{lookup('parallel_requests')}"
                - --mmproj
                - "%{lookup('mmproj_path')}"
                - --image-max-tokens
                - "%{lookup('image_max_tokens')}"
                - --jinja
                - --reasoning
                - 'off'
              envFrom:
                - secretRef:
                    name: "%{nest::kubernetes::service}"
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: "%{lookup('cpu_request')}"
                  memory: "%{lookup('memory_request')}"
                  squat.ai/gpu: '1'
                limits:
                  cpu: "%{lookup('cpu_limit')}"
                  memory: "%{lookup('memory_limit')}"
                  squat.ai/gpu: '1'
              volumeMounts:
                - name: cache
                  mountPath: /cache
              startupProbe:
                tcpSocket:
                  port: 8080
                # Allow up to 1 hour for initial model download + load
                periodSeconds: 10
                failureThreshold: 360
                timeoutSeconds: 1
              readinessProbe:
                tcpSocket:
                  port: 8080
                periodSeconds: 5
                failureThreshold: 3
                timeoutSeconds: 1
              livenessProbe:
                tcpSocket:
                  port: 8080
                # Don't be too twitchy; inference can stall briefly under load
                periodSeconds: 10
                failureThreshold: 6
                timeoutSeconds: 1
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-cache"

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{nest::kubernetes::service}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
      ports:
        - name: http
          port: 80
          targetPort: 8080
