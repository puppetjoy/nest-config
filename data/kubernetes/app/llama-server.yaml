---
include:
 - 'nest::service::llama_server'

plan_base: 'nest::eyrie::ai::llama'
cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
ingress_class: contour-compute

# Canonical local generative model service.  The 35B-A3B MoE resident service
# uses Joy's requested Strix Halo-oriented UD-Q8_K_XL MTP quant while preserving
# the four-slot, vision-enabled topology.  The larger cache keeps current
# rollback and benchmark artifacts while staging the MTP model.
cache_size: 320Gi
storage_class: owl-crypt
image: registry.gitlab.joyfullee.me/nest/tools/llama.cpp:zen5
llama_cpp_backend: vulkan
llama_cpp_hsa_override_gfx_version: ''
model_repo: unsloth/Qwen3.6-35B-A3B-MTP-GGUF
model_file: Qwen3.6-35B-A3B-MTP-UD-Q8_K_XL.gguf
model_path: /cache/models/Qwen3.6-35B-A3B-MTP-UD-Q8_K_XL.gguf
model_url: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf
mmproj_file: mmproj-F16.gguf
mmproj_path: /cache/models/Qwen3.6-35B-A3B-mmproj-F16.gguf
mmproj_url: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/mmproj-F16.gguf
image_max_tokens: '4096'
# Server-side guardrail: llama.cpp defaults reasoning_budget to INT_MAX when a
# Qwen request asks for thinking without a smaller budget.
reasoning_budget: '2048'
min_p: '0.0'
ctx_size: '524288'
parallel_requests: '4'
spec_type: draft-mtp
spec_draft_n_max: '2'
cpu_request: '8'
cpu_limit: '16'
memory_request: 32Gi
memory_limit: 112Gi

resources:
  backup: {}
  restore: {}
  registry_auths: {}

  storage:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-cache"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('cache_size')}"
      storageClassName: "%{lookup('storage_class')}"

  secrets:
    apiVersion: v1
    kind: Secret
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    type: Opaque
    data:
      HF_TOKEN: "%{nest::service::llama_server::hf_token_base64}"

  deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
            llama.cpp/backend: "%{lookup('llama_cpp_backend')}"
          annotations:
            llama.cpp/backend: "%{lookup('llama_cpp_backend')}"
            llama.cpp/image: "%{lookup('image')}"
        spec:
          nodeSelector:
            kubernetes.io/hostname: owl
          tolerations:
            - key: "node-role.kubernetes.io/compute"
              operator: Exists
              effect: NoSchedule
          initContainers:
            - name: fetch-model
              image: docker.io/curlimages/curl:8.11.1
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 0
                runAsGroup: 0
              command:
                - sh
                - -ceu
                - |-
                  mkdir -p "$(dirname "%{lookup('model_path')}")"
                  if [ ! -s "%{lookup('model_path')}" ]; then
                    tmp="%{lookup('model_path')}.tmp"
                    curl -fL --retry 5 --retry-delay 5 --connect-timeout 30 \
                      -o "$tmp" "%{lookup('model_url')}"
                    mv "$tmp" "%{lookup('model_path')}"
                  fi
                  if [ ! -s "%{lookup('mmproj_path')}" ]; then
                    tmp="%{lookup('mmproj_path')}.tmp"
                    curl -fL --retry 5 --retry-delay 5 --connect-timeout 30 \
                      -o "$tmp" "%{lookup('mmproj_url')}"
                    mv "$tmp" "%{lookup('mmproj_path')}"
                  fi
                  ls -lh "%{lookup('model_path')}"
                  ls -lh "%{lookup('mmproj_path')}"
              volumeMounts:
                - name: cache
                  mountPath: /cache
          containers:
            - name: llama-server
              image: "%{lookup('image')}"
              imagePullPolicy: Always
              command:
                - sh
                - -ceu
                - |-
                  backend="${LLAMA_CPP_BACKEND:-%{lookup('llama_cpp_backend')}}"
                  case "$backend" in
                    vulkan|rocm|rocm-rocwmma) ;;
                    *) echo "unsupported llama.cpp backend: $backend" >&2; exit 64 ;;
                  esac
                  if [ -z "${HSA_OVERRIDE_GFX_VERSION:-}" ]; then
                    unset HSA_OVERRIDE_GFX_VERSION
                  fi
                  server="/usr/local/bin/llama-server-${backend}"
                  if [ ! -x "$server" ]; then
                    echo "missing llama.cpp backend binary: $server" >&2
                    ls -l /usr/local/bin/llama-server* >&2 || true
                    exit 66
                  fi
                  echo "llama.cpp backend=${backend} server=${server} image=%{lookup('image')} service=%{nest::kubernetes::service}"
                  exec "$server" --host 0.0.0.0 "$@"
                - llama-server
              args:
                - --model
                - "%{lookup('model_path')}"
                - --ctx-size
                - "%{lookup('ctx_size')}"
                - --parallel
                - "%{lookup('parallel_requests')}"
                - --mmproj
                - "%{lookup('mmproj_path')}"
                - --image-max-tokens
                - "%{lookup('image_max_tokens')}"
                - --reasoning-budget
                - "%{lookup('reasoning_budget')}"
                - --min-p
                - "%{lookup('min_p')}"
                - --spec-type
                - "%{lookup('spec_type')}"
                - --spec-draft-n-max
                - "%{lookup('spec_draft_n_max')}"
              env:
                - name: LLAMA_CPP_BACKEND
                  value: "%{lookup('llama_cpp_backend')}"
                - name: LLAMA_CPP_IMAGE
                  value: "%{lookup('image')}"
                - name: LLAMA_CPP_SERVICE
                  value: "%{nest::kubernetes::service}"
                - name: HSA_OVERRIDE_GFX_VERSION
                  value: "%{lookup('llama_cpp_hsa_override_gfx_version')}"
              envFrom:
                - secretRef:
                    name: "%{nest::kubernetes::service}"
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: "%{lookup('cpu_request')}"
                  memory: "%{lookup('memory_request')}"
                  squat.ai/gpu: '1'
                limits:
                  cpu: "%{lookup('cpu_limit')}"
                  memory: "%{lookup('memory_limit')}"
                  squat.ai/gpu: '1'
              volumeMounts:
                - name: cache
                  mountPath: /cache
              startupProbe:
                tcpSocket:
                  port: 8080
                # Allow up to 1 hour for initial model download + load
                periodSeconds: 10
                failureThreshold: 360
                timeoutSeconds: 1
              readinessProbe:
                tcpSocket:
                  port: 8080
                periodSeconds: 5
                failureThreshold: 3
                timeoutSeconds: 1
              livenessProbe:
                tcpSocket:
                  port: 8080
                # Don't be too twitchy; inference can stall briefly under load
                periodSeconds: 10
                failureThreshold: 6
                timeoutSeconds: 1
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-cache"

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      labels:
        app: "%{nest::kubernetes::service}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
      ports:
        - name: http
          port: 80
          targetPort: 8080

  certs:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: "%{nest::kubernetes::service}-certs"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      secretName: "%{nest::kubernetes::service}-certs"
      issuerRef:
        name: "%{lookup('cert_issuer')}"
        kind: "%{lookup('cert_issuer_kind')}"
      dnsNames:
        - "%{nest::kubernetes::fqdn}"

  ingress:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
      annotations:
        projectcontour.io/response-timeout: infinity
    spec:
      ingressClassName: "%{lookup('ingress_class')}"
      rules:
        - host: "%{nest::kubernetes::fqdn}"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: "%{nest::kubernetes::service}"
                    port:
                      number: 80
      tls:
        - secretName: "%{nest::kubernetes::service}-certs"
          hosts:
            - "%{nest::kubernetes::fqdn}"
