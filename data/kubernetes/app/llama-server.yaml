---
include:
 - 'nest::service::llama_server'

plan_base: 'nest::eyrie::ai::llama'

# Qwen3.5-122B-A10B Q4_K_M is ~78 GiB; keep room for split GGUF
# shards, the KV cache, and llama.cpp metadata in the persistent HF cache.
cache_size: 160Gi
storage_class: owl-crypt

resources:
  backup: {}
  restore: {}
  registry_auths: {}

  storage:
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "%{nest::kubernetes::service}-cache"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "%{lookup('cache_size')}"
      storageClassName: "%{lookup('storage_class')}"

  secrets:
    apiVersion: v1
    kind: Secret
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    type: Opaque
    data:
      HF_TOKEN: "%{nest::service::llama_server::hf_token_base64}"

  deployment:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "%{nest::kubernetes::service}"
      template:
        metadata:
          labels:
            app: "%{nest::kubernetes::service}"
        spec:
          affinity: "%{alias('affinity')}"
          tolerations: "%{alias('tolerations')}"
          initContainers: []
          containers:
            - name: llama-server
              image: registry.gitlab.joyfullee.me/nest/tools/llama.cpp:zen5
              # The zen5 image is built for owl/Strix Halo and reused locally by CRI-O
              # during this experiment; KubeCM rollout will refresh it after CI pushes.
              imagePullPolicy: IfNotPresent
              command: ['llama-server', '--host', '0.0.0.0']
              args: "%{alias('server_args')}"
              envFrom:
                - secretRef:
                    name: "%{nest::kubernetes::service}"
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: '8'
                  memory: 96Gi
                  squat.ai/gpu: '1'
                limits:
                  cpu: '16'
                  memory: 120Gi
                  squat.ai/gpu: '1'
              volumeMounts:
                - name: cache
                  mountPath: /root/.cache
              startupProbe:
                tcpSocket:
                  port: 8080
                # Allow up to 2 hours for initial HF download + model load
                periodSeconds: 10
                failureThreshold: 720   # 720 * 10s = 7200s = 120m
                timeoutSeconds: 1
              readinessProbe:
                tcpSocket:
                  port: 8080
                periodSeconds: 5
                failureThreshold: 3
                timeoutSeconds: 1
              livenessProbe:
                tcpSocket:
                  port: 8080
                # Don’t be too twitchy; inference can stall briefly under load
                periodSeconds: 10
                failureThreshold: 6     # ~60s
                timeoutSeconds: 1
          volumes:
            - name: cache
              persistentVolumeClaim:
                claimName: "%{nest::kubernetes::service}-cache"

  service:
    apiVersion: v1
    kind: Service
    metadata:
      name: "%{nest::kubernetes::service}"
      namespace: "%{nest::kubernetes::namespace}"
    spec:
      type: ClusterIP
      selector:
        app: "%{nest::kubernetes::service}"
      ports:
        - name: http
          port: 80
          targetPort: 8080
