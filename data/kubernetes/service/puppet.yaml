---
include:
  - 'nest::service::puppet'

service_name: "%{nest::kubernetes::service}"
cert_issuer: eyrie-ca
cert_issuer_kind: ClusterIssuer
ingress_class: contour-workstation
puppet_load_balancer_ip: '172.21.2.0'
node_role: workstation
storage_class: ceph-filesystem
postgres_storage_class: ceph-block
puppet_server_certname: puppet.eyrie
puppet_server_alt_names: puppet.eyrie
puppetboard_fqdn: puppet.eyrie
puppetboard_certname: puppetboard
puppetdb_fqdn: puppetdb.eyrie
