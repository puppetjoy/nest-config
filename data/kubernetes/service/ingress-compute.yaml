---
service_name: ingress-compute
class_name: contour-compute
node_role: compute

.affinity: &affinity
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: "node-role.kubernetes.io/%{lookup('node_role')}"
            operator: Exists

.tolerations: &tolerations
  - key: "node-role.kubernetes.io/%{lookup('node_role')}"
    operator: Exists
    effect: NoSchedule

values:
  contour:
    affinity: *affinity
    tolerations: *tolerations
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 512Mi
  envoy:
    affinity: *affinity
    tolerations: *tolerations
    resources:
      limits:
        memory: 1Gi
      requests:
        memory: 512Mi
    shutdownManager:
      resources:
        limits:
          memory: 512Mi
        requests:
          memory: 256Mi
