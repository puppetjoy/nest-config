---
# Qwen3.5-35B-A3B was the preferred first candidate, but it OOM-killed beside
# the existing 122B rollback lane even after reducing to one 32K slot and a
# 96Gi cgroup limit. Use the reviewed fallback family: dense Qwen3-14B at
# Q5_K_M for a better quality/speed tradeoff than 9B while remaining small
# enough to co-reside with llama-qwen.
# https://huggingface.co/bartowski/Qwen_Qwen3-14B-GGUF
model_repo: bartowski/Qwen_Qwen3-14B-GGUF
model_file: Qwen_Qwen3-14B-Q5_K_M.gguf
model_path: /cache/models/Qwen_Qwen3-14B-Q5_K_M.gguf
model_url: https://huggingface.co/bartowski/Qwen_Qwen3-14B-GGUF/resolve/main/Qwen_Qwen3-14B-Q5_K_M.gguf
ctx_size: '65536'
parallel_requests: '2'
cpu_request: '4'
cpu_limit: '12'
# Owl currently has enough allocatable headroom for one more GPU pod but not a
# second large memory request beside llama-qwen. Keep the request scheduler-fit
# sized and rely on the higher limit for llama.cpp/GTT-backed runtime headroom.
# The 72Gi limit still OOM-killed during 35B-A3B model/context load while node
# MemoryPressure was false, so allow more cgroup headroom without increasing the
# scheduling request.
memory_request: 16Gi
memory_limit: 96Gi
cache_size: 48Gi
