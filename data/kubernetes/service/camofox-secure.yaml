---
service_name: camofox-secure
service_instance: secure
# Trusted internal Nest canary endpoint: approved secure Camofox paths need
# the same `.eyrie` reachability as camofox-general while final-purchase
# authority stays in Hermes secure-browser approval gates.
# Metadata/link-local egress remains constrained by the app NetworkPolicy.
camofox_allow_private_network: 'true'
profile_storage_size: 12Gi
profile_storage_description: persistent secure-browser session/profile state
bitwarden_extension_path: /opt/nest/camofox/extensions/bitwarden.xpi
bitwarden_extension_id: '{446900e4-71c2-419f-a6a7-df9c091e268b}'
bitwarden_extension_install_url: https://addons.mozilla.org/firefox/downloads/latest/bitwarden-password-manager/latest.xpi

resources:
  bitwarden-policy:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: camofox-secure-bitwarden-policy
      namespace: "%{nest::kubernetes::namespace}"
    data:
      README.txt: |-
        Secure Camofox is the instance intended to preserve Joy's login/session
        continuity during a secure-browser canary. Its profile PVC is persistent,
        and this policy records the intended Firefox/Bitwarden preinstall path.
        This does not authorize final purchases; the existing owner approval gate
        still controls all final purchase actions.
      policies.json: |-
        {
          "policies": {
            "ExtensionSettings": {
              "%{lookup('bitwarden_extension_id')}": {
                "installation_mode": "force_installed",
                "install_url": "%{lookup('bitwarden_extension_install_url')}"
              }
            }
          }
        }
