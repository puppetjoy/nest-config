---
nest::classes:
  - 'nest::tool::llamacpp'

# Qwen3.5 dense GGUFs use architecture qwen35, which is unsupported by the
# previous b7595 Kestrel tool image.  b9592 is the current upstream release at
# rollout time and contains both qwen35 and qwen35moe model support.
nest::tool::llamacpp::revision: 'b9592'
# Zen5 is Joy's Strix Halo/llama-qwen comparison target. Keep Vulkan as the
# default `llama-server` while also building a ROCm/HIP variant for deliberate
# backend selection from KubeCM.
nest::tool::llamacpp::build_rocm: true
nest::tool::llamacpp::rocm_amdgpu_targets: ['gfx1151']
nest::use: ['vulkan']

nest::package_keywords:
  # ROCm/HIP 7.2 stack for the zen5 Strix Halo ROCm llama.cpp build.
  dev-build/rocm-cmake: {}
  dev-libs/rocm-comgr: {}
  dev-libs/rocm-core: {}
  dev-libs/rocm-device-libs: {}
  dev-libs/rocr-runtime: {}
  dev-libs/roct-thunk-interface: {}
  dev-util/hip: {}
  dev-util/hipcc: {}
  dev-util/rocminfo: {}
  llvm-core/clang: {}
  llvm-core/clang-common: {}
  llvm-core/clang-linker-config: {}
  llvm-core/clang-toolchain-symlinks: {}
  llvm-core/lld: {}
  llvm-core/lld-toolchain-symlinks: {}
  llvm-core/llvm: {}
  llvm-core/llvm-toolchain-symlinks: {}
  llvm-core/llvmgold: {}
  llvm-runtimes/clang-rtlib-config: {}
  llvm-runtimes/clang-runtime: {}
  llvm-runtimes/clang-stdlib-config: {}
  llvm-runtimes/clang-unwindlib-config: {}
  llvm-runtimes/compiler-rt: {}
  llvm-runtimes/compiler-rt-sanitizers: {}
  llvm-runtimes/openmp: {}
  sci-libs/hipBLAS: {}
  sci-libs/hipBLAS-common: {}
  sci-libs/hipBLASLt: {}
  sci-libs/rocBLAS: {}
