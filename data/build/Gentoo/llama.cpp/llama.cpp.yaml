---
nest::classes:
  - 'nest::tool::llamacpp'

# Qwen3.5/Qwen3.6 MoE GGUFs use architecture qwen35moe, which is unsupported
# by the previous b7595 tool image.  The current llama-qwen deployment has
# validated b9222 with qwen35moe, multimodal projector loading, Vulkan, and
# 4x262K slots, so keep this release pin until a newer image is benchmarked.
nest::tool::llamacpp::revision: 'b9222'
nest::use: ['vulkan']
