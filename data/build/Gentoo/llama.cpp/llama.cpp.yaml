---
nest::classes:
  - 'nest::tool::llamacpp'

# Qwen3.5 dense GGUFs use architecture qwen35, which is unsupported by the
# previous b7595 Kestrel tool image.  b9592 is the current upstream release at
# rollout time and contains both qwen35 and qwen35moe model support.
nest::tool::llamacpp::revision: 'b9592'
nest::use: ['vulkan']
